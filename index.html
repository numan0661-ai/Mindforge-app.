<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindForge AI - İş & Gelişim</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #06b6d4;
            --bg: #0f0f23;
            --surface: #1a1a2e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
        }

        .app-container { max-width: 430px; margin: 0 auto; padding: 20px; }
        
        /* Ekranlar */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }

        /* Kartlar */
        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Butonlar ve Inputlar */
        input, select {
            width: 100%; padding: 12px; margin: 5px 0;
            border-radius: 10px; border: 1px solid #333;
            background: #0b0b1a; color: white; box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer;
        }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex; justify-content: space-around; padding: 15px;
            backdrop-filter: blur(10px);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="screen active" id="homeScreen">
        <h1 style="background: linear-gradient(to right, #6366f1, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">MindForge Pro</h1>
        
        <div class="module-grid">
            <div class="card" onclick="showScreen('businessScreen')">
                <div style="font-size: 30px;">💼</div>
                <h3>Business</h3>
                <p style="font-size: 12px; color: var(--text-muted);">Maliyet & Sipariş</p>
            </div>
            <div class="card" onclick="showScreen('logicScreen')">
                <div style="font-size: 30px;">🧠</div>
                <h3>Logic</h3>
                <p style="font-size: 12px; color: var(--text-muted);">Zeka Oyunları</p>
            </div>
        </div>
    </div>

    <div class="screen" id="businessScreen">
        <button onclick="showScreen('homeScreen')" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">← Geri</button>
        <h2>BusinessForge</h2>
        
        <div class="card">
            <label>Ölçüler (cm)</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="w" placeholder="En">
                <input type="number" id="h" placeholder="Boy">
            </div>
            
            <label>Malzeme & Fire</label>
            <select id="mType" onchange="updatePrice()">
                <option value="450">3mm Şeffaf Pleksi (450₺/m²)</option>
                <option value="600">3mm Renkli Pleksi (600₺/m²)</option>
                <option value="250">3mm MDF/Ahşap (250₺/m²)</option>
                <option value="custom">Özel Fiyat</option>
            </select>
            <input type="number" id="uPrice" placeholder="m² Birim Fiyatı">
            <input type="number" id="waste" placeholder="Fire %" value="10">
            
            <label>Kâr Marjı</label>
            <select id="margin">
                <option value="1.5">%50 Kâr</option>
                <option value="2">%100 Kâr</option>
                <option value="2.5">%150 Kâr</option>
            </select>

            <button class="btn" onclick="calculate()">HASSAS HESAPLA</button>
            
            <div id="res" style="margin-top: 20px; text-align: center; border-top: 1px solid #333; padding-top: 15px;">
                <div id="areaText" style="color: var(--text-muted); font-size: 14px;">Alan: 0 m²</div>
                <div id="priceText" style="font-size: 24px; font-weight: 800; color: var(--success); margin-top: 5px;">0.00 ₺</div>
            </div>
        </div>
    </div>

    <div class="screen" id="logicScreen">
        <button onclick="showScreen('homeScreen')" style="background:none; border:none; color:white; font-size:20px;">← Geri</button>
        <h2>LogicForge</h2>
        <div class="card">
            <p>Çok yakında: Hızlı karar verme ve strateji oyunları!</p>
        </div>
    </div>

    <div class="nav-bar">
        <div onclick="showScreen('homeScreen')">🏠</div>
        <div onclick="showScreen('businessScreen')">📊</div>
        <div onclick="showScreen('logicScreen')">🧩</div>
    </div>
</div>

<script>
    // Ekran değiştirme fonksiyonu
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Seçilen malzemeye göre birim fiyatı kutuya yazar
    function updatePrice() {
        const sel = document.getElementById('mType');
        const pri = document.getElementById('uPrice');
        if(sel.value !== "custom") pri.value = sel.value;
    }

    // ASIL HESAPLAMA MOTORU
    function calculate() {
        const width = parseFloat(document.getElementById('w').value) || 0;
        const height = parseFloat(document.getElementById('h').value) || 0;
        const unit = parseFloat(document.getElementById('uPrice').value) || 0;
        const wst = parseFloat(document.getElementById('waste').value) || 0;
        const mar = parseFloat(document.getElementById('margin').value) || 1;

        // Alanı m² cinsinden hesapla
        const area = (width * height) / 10000;
        
        // Maliyet: Alan * Fiyat * Fire Payı + Sabit Gider (50₺ Kargo/Amortisman)
        const cost = (area * unit * (1 + wst/100)) + 50;
        const final = Math.round(cost * mar);

        document.getElementById('areaText').innerHTML = `Alan: ${area.toFixed(4)} m² | Maliyet: ${cost.toFixed(2)} ₺`;
        document.getElementById('priceText').innerHTML = `${final} ₺`;
    }
</script>

</body>
</html>
<div class="screen" id="logicScreen">
    <button onclick="showScreen('homeScreen')" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">← Geri</button>
    <h2>LogicForge: Hız Testi</h2>
    
    <div class="card" id="gameArea">
        <div id="gameStatus" style="text-align:center; margin-bottom:15px; color:var(--accent); font-weight:bold;">Hazır mısın?</div>
        
        <div id="questBox" style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; text-align:center; display:none;">
            <div style="font-size:14px; color:var(--text-muted);">Senaryo:</div>
            <div id="questText" style="font-size:18px; margin:10px 0; font-weight:bold;"></div>
            <input type="number" id="userGuess" placeholder="Fiyat Tahmini (₺)">
            <button class="btn" style="margin-top:10px;" onclick="checkGuess()">CEVAPLA</button>
        </div>

        <button id="startLogicBtn" class="btn" onclick="startLogicGame()">OYUNU BAŞLAT</button>
        
        <div id="logicStats" style="margin-top:20px; display:flex; justify-content:space-around; font-size:14px; color:var(--text-muted);">
            <span>Puan: <b id="logicScore" style="color:var(--success);">0</b></span>
            <span>Süre: <b id="logicTimer">0s</b></span>
        </div>
    </div>
</div>

<script>
    let currentQuest = {};
    let score = 0;
    let gameActive = false;
    let timeLeft = 30;
    let timerInterval;

    function startLogicGame() {
        gameActive = true;
        score = 0;
        timeLeft = 30;
        document.getElementById('logicScore').innerText = score;
        document.getElementById('startLogicBtn').style.display = 'none';
        document.getElementById('questBox').style.display = 'block';
        document.getElementById('gameStatus').innerText = "Hızlı Hesapla!";
        
        nextQuest();
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('logicTimer').innerText = timeLeft + "s";
            if(timeLeft <= 0) endGame();
        }, 1000);
    }

    function nextQuest() {
        const w = Math.floor(Math.random() * 50) + 10;
        const h = Math.floor(Math.random() * 50) + 10;
        const unitPrice = 400; // Standart m2 fiyatı baz alındı
        const area = (w * h) / 10000;
        const cost = (area * unitPrice) + 50; // + Sabit gider
        const correctPrice = Math.round(cost * 2); // %100 kar hedefi

        currentQuest = { price: correctPrice };
        document.getElementById('questText').innerText = `${w}x${h} cm Pleksi için %100 karlı fiyat nedir?`;
        document.getElementById('userGuess').value = "";
        document.getElementById('userGuess').focus();
    }

    function checkGuess() {
        if(!gameActive) return;
        const guess = parseInt(document.getElementById('userGuess').value);
        const diff = Math.abs(guess - currentQuest.price);

        if(diff <= (currentQuest.price * 0.1)) { // %10 tolerans payı
            score += 10;
            document.getElementById('gameStatus').innerText = "Harika! Tam isabet.";
            document.getElementById('gameStatus').style.color = "var(--success)";
        } else {
            document.getElementById('gameStatus').innerText = "Hatalı! Doğrusu: " + currentQuest.price + "₺";
            document.getElementById('gameStatus').style.color = "#ef4444";
        }
        
        document.getElementById('logicScore').innerText = score;
        setTimeout(nextQuest, 1000);
    }

    function endGame() {
        clearInterval(timerInterval);
        gameActive = false;
        document.getElementById('questBox').style.display = 'none';
        document.getElementById('startLogicBtn').style.display = 'block';
        document.getElementById('startLogicBtn').innerText = "TEKRAR DENE";
        document.getElementById('gameStatus').innerText = "Oyun Bitti! Toplam Puan: " + score;
        
        // Gelişmiş AI Analizi (Basit versiyon)
        if(score > 50) showToast("Ticari zekan çok keskin! 🔥");
    }
</script>
