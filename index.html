<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindForge Master Elite</title>
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #0b0b1a;
            --surface: #16162d; --text: #ffffff; --text-muted: #94a3b8;
            --success: #10b981; --gold: #f59e0b; --purple: #a855f7; --danger: #ef4444; --corel: #4caf50;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 95px; }
        .app-container { max-width: 430px; margin: 0 auto; padding: 15px; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; margin-top: 5px; }
        .btn:active { transform: scale(0.98); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #2d2d44; background: #0b0b1a; color: white; box-sizing: border-box; }
        
        /* Seviye Çubuğu Stili */
        .lvl-bar-bg { width: 100%; height: 6px; background: #2d2d44; border-radius: 3px; margin-top: 8px; }
        .lvl-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s ease; border-radius: 3px; box-shadow: 0 0 10px var(--gold); }
        .rank-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; background: var(--gold); color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22, 22, 45, 0.96); display: flex; justify-content: space-around; padding: 15px 0 25px; backdrop-filter: blur(10px); border-top: 1px solid #2d2d44; z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .cal-day.done { background: var(--success); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="screen active" id="homeScreen">
        <h2 style="color:var(--accent)">MindForge Master</h2>
        
        <div class="card" style="border: 1px solid var(--gold);">
            <div class="rank-badge" id="userRank">ÇIRAK</div>
            <h4 style="margin:0; color:var(--gold);">Ustalık Yolculuğu</h4>
            <div style="font-size: 12px; margin-top: 5px;">Seviye: <span id="lvlLabel">1</span> | EXP: <span id="expLabel">0</span>/100</div>
            <div class="lvl-bar-bg"><div class="lvl-bar-fill" id="lvlFill"></div></div>
        </div>

        <div class="card" onclick="showScreen('exerciseScreen')">
            <h4 style="margin:0">📆 Antrenman Takvimi</h4>
            <div class="calendar-grid" id="mainCalendar" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px;"></div>
        </div>

        <div class="grid-2">
            <div class="card" onclick="showScreen('corelScreen')" style="text-align:center; border:1px solid var(--corel)">🎨<br><small>CorelMaster</small></div>
            <div class="card" onclick="showScreen('wordScreen')" style="text-align:center; border:1px solid var(--purple)">📚<br><small>Kelimeler</small></div>
            <div class="card" onclick="showScreen('dictionScreen')" style="text-align:center;">🗣️<br><small>Diksiyon</small></div>
            <div class="card" onclick="showScreen('logicScreen')" style="text-align:center;">⚡<br><small>Zeka</small></div>
            <div class="card" onclick="showScreen('confidenceScreen')" style="text-align:center;">💎<br><small>Özgüven</small></div>
            <div class="card" onclick="showScreen('mentalScreen')" style="text-align:center;">🧘‍♂️<br><small>Mental</small></div>
        </div>
    </div>

    <div class="screen" id="businessScreen">
        <h2>BusinessForge</h2>
        <div class="card">
            <label>En x Boy (cm)</label>
            <div class="grid-2"><input type="number" id="w" placeholder="En"><input type="number" id="h" placeholder="Boy"></div>
            <label>Malzeme</label><select id="mType" onchange="syncPrice()"></select>
            <input type="number" id="uPrice" placeholder="₺/m²">
            <button class="btn" onclick="calculate()">HESAPLA</button>
            <h2 id="finalRes" style="text-align:center; color:var(--success);">0₺</h2>
        </div>
    </div>

    <div class="screen" id="settingsScreen">
        <h2>Ayarlar</h2>
        <div class="card">
            <label>Şeffaf m² (₺)</label><input type="number" id="set_trans" oninput="saveConfig()">
            <label>Renkli m² (₺)</label><input type="number" id="set_color" oninput="saveConfig()">
            <label>Sabit Gider (₺)</label><input type="number" id="set_fixed" oninput="saveConfig()">
        </div>
        <button class="btn" style="background:var(--danger)" onclick="resetSystem()">Sıfırla</button>
    </div>

    <div class="screen" id="logicScreen">
        <button class="btn" style="background:none; color:var(--accent); text-align:left; padding:0;" onclick="showScreen('homeScreen')">← Geri</button>
        <div class="card">
            <h4 style="color:var(--purple); margin:0;">Zeka Seviyesi: <span id="logicLvlDisplay">1</span></h4>
            <div id="logicQuest" style="font-size:24px; font-weight:bold; text-align:center; margin:20px 0;">? x ?</div>
            <div id="logicOpts" class="grid-2"></div>
        </div>
    </div>

    <div class="screen" id="corelScreen">
        <button class="btn" style="background:none; color:var(--accent); text-align:left; padding:0;" onclick="showScreen('homeScreen')">← Geri</button>
        <div class="card"><h4>Corel Kısayol Testi</h4><div id="corelQuest" style="text-align:center; margin:15px 0;"></div><div id="corelOpts" class="grid-2"></div></div>
    </div>
    
    <div class="screen" id="exerciseScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><h4 id="exTitle">Program</h4><div id="exListBody"></div><button class="btn" onclick="logWorkout()">Tamamla ✅</button></div></div>
    <div class="screen" id="dictionScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><h4>Tekerleme</h4><div id="tekerlemeBox"></div><button class="btn" onclick="nextTekerleme()">Yeni</button></div></div>
    <div class="screen" id="wordScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div id="wordListBody"></div></div>
    <div class="screen" id="confidenceScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><h4>Görev</h4><div id="confTask"></div></div></div>
    <div class="screen" id="mentalScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><h4>Nefes</h4><div id="boxBreath">DUR</div><button class="btn" onclick="startBoxBreathing()">Başlat</button></div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showScreen('homeScreen', this)">🏠</div>
        <div class="nav-item" onclick="showScreen('businessScreen', this)">📊</div>
        <div class="nav-item" onclick="showScreen('settingsScreen', this)">⚙️</div>
    </div>
</div>

<script>
    // --- AKILLI MOTOR VERİLERİ ---
    let stats = JSON.parse(localStorage.getItem('mf_stats')) || { exp: 0, lvl: 1, logicLvl: 1, streak: 0 };
    let config = { trans: 450, color: 600, fixed: 50 };
    let workoutHistory = JSON.parse(localStorage.getItem('mf_workout_history')) || [];

    function updateMasteryUI() {
        document.getElementById('lvlLabel').innerText = stats.lvl;
        document.getElementById('expLabel').innerText = stats.exp;
        document.getElementById('logicLvlDisplay').innerText = stats.logicLvl;
        const progress = (stats.exp / (stats.lvl * 100)) * 100;
        document.getElementById('lvlFill').style.width = progress + "%";
        
        const ranks = ["ÇIRAK", "KALFA", "USTA", "ÜSTAT", "EFSANE"];
        document.getElementById('userRank').innerText = ranks[Math.min(Math.floor(stats.lvl/5), 4)];
        localStorage.setItem('mf_stats', JSON.stringify(stats));
    }

    function addExp(amount) {
        stats.exp += amount;
        if(stats.exp >= stats.lvl * 100) {
            stats.exp = 0;
            stats.lvl++;
            alert("TEBRİKLER! Seviye Atladın: " + stats.lvl);
        }
        updateMasteryUI();
    }

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el && el.classList.contains('nav-item')) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'homeScreen') renderCalendar();
        if(id === 'logicScreen') initLogicGame();
        if(id === 'corelScreen') initCorelQuiz();
        if(id === 'exerciseScreen') renderWorkout();
        if(id === 'wordScreen') renderWords();
    }

    // --- ZEKA (Dinamik Zorluk) ---
    function initLogicGame() {
        const difficulty = stats.logicLvl;
        const w = Math.floor(Math.random() * (10 + difficulty)) + 5;
        const h = Math.floor(Math.random() * (10 + difficulty)) + 5;
        const ans = w * h;
        document.getElementById('logicQuest').innerText = `${w} x ${h} = ?`;
        const opts = [ans, ans+10, ans-5, ans+15].sort(()=>Math.random()-0.5);
        document.getElementById('logicOpts').innerHTML = opts.map(o => `<button class="btn" style="background:var(--surface); border:1px solid #333;" onclick="checkLogic(${o},${ans})">${o}</button>`).join('');
    }
    function checkLogic(s, a) {
        if(s===a) { addExp(15); stats.logicLvl++; alert("Doğru! Zorluk Arttı."); }
        else { stats.logicLvl = Math.max(1, stats.logicLvl - 1); alert("Hata! Seviye Düştü."); }
        initLogicGame();
    }

    // --- DİĞER FONKSİYONLAR (Business, Settings vs.) ---
    function saveConfig() {
        config = { trans: document.getElementById('set_trans').value, color: document.getElementById('set_color').value, fixed: document.getElementById('set_fixed').value };
        localStorage.setItem('mf_elite_config', JSON.stringify(config)); updateUI();
    }
    function updateUI() {
        const sel = document.getElementById('mType');
        sel.innerHTML = `<option value="${config.trans}">Şeffaf</option><option value="${config.color}">Renkli</option>`;
        document.getElementById('uPrice').value = sel.value;
    }
    function syncPrice() { document.getElementById('uPrice').value = document.getElementById('mType').value; }
    function calculate() {
        const w = document.getElementById('w').value, h = document.getElementById('h').value;
        const res = (((w*h)/10000)*document.getElementById('uPrice').value) + parseFloat(config.fixed);
        document.getElementById('finalRes').innerText = Math.round(res) + "₺";
        addExp(5); // Her hesaplama 5 EXP verir
    }

    // Takvim, Tekerleme vb.
    function renderCalendar() {
        const cal = document.getElementById('mainCalendar'); cal.innerHTML = "";
        const now = new Date(); const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const dateStr = new Date(now.getFullYear(), now.getMonth(), i).toLocaleDateString('tr-TR');
            const dayDiv = document.createElement('div');
            dayDiv.className = `cal-day ${workoutHistory.includes(dateStr) ? 'done' : ''}`;
            dayDiv.innerText = i; cal.appendChild(dayDiv);
        }
    }
    function logWorkout() {
        const d = new Date().toLocaleDateString('tr-TR');
        if(!workoutHistory.includes(d)) { workoutHistory.push(d); localStorage.setItem('mf_workout_history', JSON.stringify(workoutHistory)); addExp(50); }
        alert("Antrenman Tamamlandı! +50 EXP");
    }

    // Corel & Kelime & Diksiyon Verileri
    function initCorelQuiz() {
        const q = {q: "Gruplama?", a: "Ctrl+G", o: ["Ctrl+G", "Ctrl+U", "Ctrl+K", "Ctrl+L"]};
        document.getElementById('corelQuest').innerText = q.q;
        document.getElementById('corelOpts').innerHTML = q.o.map(opt => `<button class="btn" style="background:var(--surface);" onclick="addExp(10); alert('Doğru!'); initCorelQuiz();">${opt}</button>`).join('');
    }
    function renderWords() { document.getElementById('wordListBody').innerHTML = `<div class="card"><b>Liyakat:</b> Layık olma.</div>`; }
    function nextTekerleme() { document.getElementById('tekerlemeBox').innerText = "Bir berber bir berbere..."; }
    function startBoxBreathing() { let i=0; setInterval(() => { document.getElementById('boxBreath').innerText = ["AL","TUT","VER","BEKLE"][i]; i=(i+1)%4; }, 4000); }

    window.onload = () => {
        const saved = localStorage.getItem('mf_elite_config'); if(saved) config = JSON.parse(saved);
        document.getElementById('set_trans').value = config.trans;
        document.getElementById('set_color').value = config.color;
        document.getElementById('set_fixed').value = config.fixed;
        updateUI(); renderCalendar(); updateMasteryUI();
    };
    function resetSystem() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
