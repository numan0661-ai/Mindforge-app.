<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindForge Master Elite</title>
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #0b0b1a;
            --surface: #16162d; --text: #ffffff; --text-muted: #94a3b8;
            --success: #10b981; --gold: #f59e0b; --purple: #a855f7; --danger: #ef4444; --corel: #4caf50;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 95px; overflow-x: hidden; }
        .app-container { max-width: 430px; margin: 0 auto; padding: 15px; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; margin-top: 5px; }
        .btn:active { transform: scale(0.98); }
        .btn-outline { background: var(--surface); border: 1px solid #333; color: white; min-height: 50px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #2d2d44; background: #0b0b1a; color: white; box-sizing: border-box; }
        
        /* Seviye Sistemi */
        .lvl-bar-bg { width: 100%; height: 6px; background: #2d2d44; border-radius: 3px; margin-top: 8px; }
        .lvl-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s ease; border-radius: 3px; box-shadow: 0 0 10px var(--gold); }
        .rank-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; background: var(--gold); color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        /* Navigasyon */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22, 22, 45, 0.98); display: flex; justify-content: space-around; padding: 15px 0 25px; backdrop-filter: blur(10px); border-top: 1px solid #2d2d44; z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent); }

        /* Takvim */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .cal-day.done { background: var(--success); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="screen active" id="homeScreen">
        <h2 style="color:var(--accent)">MindForge Master</h2>
        
        <div class="card" style="border: 1px solid var(--gold);">
            <div class="rank-badge" id="userRank">ÇIRAK</div>
            <h4 style="margin:0; color:var(--gold);">Ustalık Seviyesi</h4>
            <div style="font-size: 12px; margin-top: 5px;">Lvl: <span id="lvlLabel">1</span> | EXP: <span id="expLabel">0</span>/100</div>
            <div class="lvl-bar-bg"><div class="lvl-bar-fill" id="lvlFill"></div></div>
        </div>

        <div class="card" onclick="showScreen('exerciseScreen')">
            <h4 style="margin:0">📆 Antrenman Takvimi</h4>
            <div class="calendar-grid" id="mainCalendar"></div>
        </div>

        <div class="grid-2">
            <div class="card" onclick="showScreen('corelScreen')" style="text-align:center; border:1px solid var(--corel)">🎨<br><small>CorelMaster</small></div>
            <div class="card" onclick="showScreen('wordScreen')" style="text-align:center; border:1px solid var(--purple)">📚<br><small>Kelimeler</small></div>
            <div class="card" onclick="showScreen('dictionScreen')" style="text-align:center;">🗣️<br><small>Diksiyon</small></div>
            <div class="card" onclick="showScreen('logicScreen')" style="text-align:center;">⚡<br><small>Zekâ</small></div>
            <div class="card" onclick="showScreen('confidenceScreen')" style="text-align:center;">💎<br><small>Özgüven</small></div>
            <div class="card" onclick="showScreen('mentalScreen')" style="text-align:center;">🧘‍♂️<br><small>Mental</small></div>
        </div>
    </div>

    <div class="screen" id="corelScreen">
        <button class="btn" style="background:none; color:var(--accent); text-align:left; padding:0;" onclick="showScreen('homeScreen')">← Geri</button>
        <div class="card">
            <h4 style="color:var(--corel); margin-top:0;">⚡ Dev Kısayol Yarışması</h4>
            <div id="corelQuest" style="text-align:center; margin:15px 0; font-weight:bold; min-height: 40px;">Soru Yükleniyor...</div>
            <div id="corelOpts" class="grid-2"></div>
        </div>
    </div>

    <div class="screen" id="businessScreen">
        <h2>BusinessForge</h2>
        <div class="card">
            <div class="grid-2"><input type="number" id="w" placeholder="En (cm)"><input type="number" id="h" placeholder="Boy (cm)"></div>
            <select id="mType" onchange="syncPrice()"></select>
            <input type="number" id="uPrice" placeholder="₺/m²">
            <button class="btn" onclick="calculate()">HESAPLA</button>
            <h2 id="finalRes" style="text-align:center; color:var(--success); margin-top:20px;">0₺</h2>
        </div>
    </div>

    <div class="screen" id="settingsScreen">
        <h2>Ayarlar</h2>
        <div class="card">
            <label>Şeffaf m² (₺)</label><input type="number" id="set_trans" oninput="saveConfig()">
            <label>Renkli m² (₺)</label><input type="number" id="set_color" oninput="saveConfig()">
            <label>Sabit Gider (₺)</label><input type="number" id="set_fixed" oninput="saveConfig()">
        </div>
        <button class="btn" style="background:var(--danger)" onclick="resetSystem()">SİSTEMİ SIFIRLA</button>
    </div>

    <div class="screen" id="wordScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div id="wordListBody"></div></div>
    <div class="screen" id="dictionScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><div id="tekerlemeBox"></div><button class="btn" onclick="renderTekerleme()">Yeni</button></div></div>
    <div class="screen" id="logicScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><div id="logicQuest" style="font-size:24px; text-align:center; margin:20px;"></div><div id="logicOpts" class="grid-2"></div></div></div>
    <div class="screen" id="exerciseScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><div id="exListBody"></div><button class="btn" onclick="logWorkout()">Tamamla ✅</button></div></div>
    <div class="screen" id="confidenceScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><div id="confTask"></div></div></div>
    <div class="screen" id="mentalScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><div class="card"><div id="boxBreath" style="text-align:center; font-size:30px; padding:20px;">DUR</div></div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showScreen('homeScreen', this)">🏠</div>
        <div class="nav-item" onclick="showScreen('businessScreen', this)">📊</div>
        <div class="nav-item" onclick="showScreen('settingsScreen', this)">⚙️</div>
    </div>
</div>

<script>
    // --- VERİ TABANI ---
    let stats = JSON.parse(localStorage.getItem('mf_stats')) || { exp: 0, lvl: 1, logicLvl: 1 };
    let config = { trans: 450, color: 600, fixed: 50 };
    let workoutHistory = JSON.parse(localStorage.getItem('mf_workout_history')) || [];

    const corelData = [
        {q:"Sayfaya MERKEZLEMEK (Center to Page)?", a:"P", o:["P","C","E","M"]},
        {q:"Yatayda merkezlemek (Center Horizontally)?", a:"E", o:["E","C","P","A"]},
        {q:"Dikeyde merkezlemek (Center Vertically)?", a:"C", o:["C","E","P","S"]},
        {q:"Gruplama (Group) kısayolu?", a:"Ctrl+G", o:["Ctrl+G","Ctrl+U","Ctrl+L","Ctrl+K"]},
        {q:"Grubu Dağıt (Ungroup) kısayolu?", a:"Ctrl+U", o:["Ctrl+U","Ctrl+G","Ctrl+K","Ctrl+L"]},
        {q:"Curveleme (Convert to Curves)?", a:"Ctrl+Q", o:["Ctrl+Q","Ctrl+L","Ctrl+K","Ctrl+G"]},
        {q:"Break Apart (Parçalara Ayır)?", a:"Ctrl+K", o:["Ctrl+K","Ctrl+L","Ctrl+U","Ctrl+Q"]},
        {q:"Shape Tool (Düğümleri Düzenleme)?", a:"F10", o:["F10","F12","F5","F6"]},
        {q:"Pick Tool (Seçim Aracı) geçişi?", a:"Space", o:["Space","Tab","Esc","Z"]},
        {q:"Export (Dosyayı Dxf/Pdf Kaydet)?", a:"Ctrl+E", o:["Ctrl+E","Ctrl+I","Ctrl+S","Ctrl+P"]},
        {q:"Nesneleri ÜSTE (Top) hizalamak?", a:"T", o:["T","B","L","R"]},
        {q:"Nesneleri ALTA (Bottom) hizalamak?", a:"B", o:["B","T","R","L"]},
        {q:"Nesneleri SOLA (Left) hizalamak?", a:"L", o:["L","R","T","B"]},
        {q:"Nesneleri SAĞA (Right) hizalamak?", a:"R", o:["R","L","T","B"]},
        {q:"Combine (Nesneleri Birleştir)?", a:"Ctrl+L", o:["Ctrl+L","Ctrl+K","Ctrl+J","Ctrl+G"]},
        {q:"En ÖNE Getir (To Front of Page)?", a:"Shift+PgUp", o:["Shift+PgUp","Ctrl+PgUp","Home","End"]},
        {q:"En ARKAYA Gönder (To Back of Page)?", a:"Shift+PgDn", o:["Shift+PgDn","Ctrl+PgDn","End","Home"]},
        {q:"Tüm Nesneleri Ekrana Sığdır (Zoom All)?", a:"F4", o:["F4","F3","F2","Z"]}
    ];

    // --- TEMEL FONKSİYONLAR ---
    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el && el.classList.contains('nav-item')) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'homeScreen') renderCalendar();
        if(id === 'corelScreen') initCorelQuiz();
        if(id === 'logicScreen') initLogicGame();
        if(id === 'wordScreen') renderWords();
        if(id === 'exerciseScreen') renderWorkout();
    }

    function addExp(amount) {
        stats.exp += amount;
        if(stats.exp >= stats.lvl * 100) { stats.exp = 0; stats.lvl++; alert("Level Atladın: " + stats.lvl); }
        updateMasteryUI();
    }

    function updateMasteryUI() {
        document.getElementById('lvlLabel').innerText = stats.lvl;
        document.getElementById('expLabel').innerText = stats.exp;
        document.getElementById('lvlFill').style.width = (stats.exp / (stats.lvl * 100)) * 100 + "%";
        const ranks = ["ÇIRAK", "KALFA", "USTA", "ÜSTAT", "EFSANE"];
        document.getElementById('userRank').innerText = ranks[Math.min(Math.floor(stats.lvl/5), 4)];
        localStorage.setItem('mf_stats', JSON.stringify(stats));
    }

    // --- COREL QUIZ ---
    function initCorelQuiz() {
        const q = corelData[Math.floor(Math.random()*corelData.length)];
        const shuffledOpts = [...q.o].sort(() => Math.random() - 0.5);
        document.getElementById('corelQuest').innerText = q.q;
        document.getElementById('corelOpts').innerHTML = shuffledOpts.map(opt => `<button class="btn btn-outline" onclick="checkCorel('${opt}','${q.a}')">${opt}</button>`).join('');
    }
    function checkCorel(s,a) { if(s===a){ addExp(15); alert("Doğru! +15 EXP"); } else alert("Yanlış! Doğru: "+a); initCorelQuiz(); }

    // --- DİĞER SİSTEMLER ---
    function initLogicGame() {
        const w = Math.floor(Math.random()*(10+stats.lvl))+5, h = Math.floor(Math.random()*(10+stats.lvl))+5;
        const ans = w * h; document.getElementById('logicQuest').innerText = `${w} x ${h} = ?`;
        const opts = [ans, ans+10, ans-5, ans+15].sort(()=>Math.random()-0.5);
        document.getElementById('logicOpts').innerHTML = opts.map(o => `<button class="btn btn-outline" onclick="checkLogic(${o},${ans})">${o}</button>`).join('');
    }
    function checkLogic(s,a) { if(s===a){ addExp(20); initLogicGame(); } else { alert("Yanlış!"); initLogicGame(); } }

    function renderWords() { document.getElementById('wordListBody').innerHTML = `<div class="card"><b>Liyakat:</b> Bir işe layık olma.</div><div class="card"><b>İntizam:</b> Düzenli olma.</div>`; }
    function renderTekerleme() { document.getElementById('tekerlemeBox').innerText = "Bir berber bir berbere..."; }
    function renderWorkout() { document.getElementById('exListBody').innerHTML = "• Şınav: 4x12<br>• Dips: 3x10"; }
    
    function renderCalendar() {
        const cal = document.getElementById('mainCalendar'); cal.innerHTML = "";
        const now = new Date(); const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        for(let i=1; i<=days; i++){
            const dateStr = new Date(now.getFullYear(), now.getMonth(), i).toLocaleDateString('tr-TR');
            const d = document.createElement('div'); d.className = `cal-day ${workoutHistory.includes(dateStr)?'done':''}`;
            d.innerText = i; cal.appendChild(d);
        }
    }
    function logWorkout() {
        const d = new Date().toLocaleDateString('tr-TR');
        if(!workoutHistory.includes(d)){ workoutHistory.push(d); localStorage.setItem('mf_workout_history', JSON.stringify(workoutHistory)); addExp(50); }
        alert("Tamamlandı! 🔥"); renderCalendar();
    }

    // --- BUSINESS & SETTINGS ---
    function saveConfig() {
        config = { trans: document.getElementById('set_trans').value, color: document.getElementById('set_color').value, fixed: document.getElementById('set_fixed').value };
        localStorage.setItem('mf_elite_config', JSON.stringify(config)); updateUI();
    }
    function updateUI() {
        const sel = document.getElementById('mType');
        sel.innerHTML = `<option value="${config.trans}">Şeffaf (${config.trans}₺)</option><option value="${config.color}">Renkli (${config.color}₺)</option>`;
        document.getElementById('uPrice').value = sel.value;
    }
    function calculate() {
        const w = document.getElementById('w').value, h = document.getElementById('h').value;
        const res = (((w*h)/10000)*document.getElementById('uPrice').value) + parseFloat(config.fixed);
        document.getElementById('finalRes').innerText = Math.round(res) + "₺"; addExp(5);
    }
    function syncPrice() { document.getElementById('uPrice').value = document.getElementById('mType').value; }

    window.onload = () => {
        const saved = localStorage.getItem('mf_elite_config'); if(saved) config = JSON.parse(saved);
        document.getElementById('set_trans').value = config.trans;
        document.getElementById('set_color').value = config.color;
        document.getElementById('set_fixed').value = config.fixed;
        updateUI(); updateMasteryUI(); renderCalendar();
    };
    function resetSystem() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
