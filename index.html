<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindForge Master</title>
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #0b0b1a;
            --surface: #16162d; --text: #ffffff; --text-muted: #94a3b8;
            --success: #10b981; --gold: #f59e0b; --purple: #a855f7; --danger: #ef4444;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .app-container { max-width: 430px; margin: 0 auto; padding: 15px; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;}
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #2d2d44; background: #0b0b1a; color: white; box-sizing: border-box; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22, 22, 45, 0.96); display: flex; justify-content: space-around; padding: 15px 0 25px; backdrop-filter: blur(10px); border-top: 1px solid #2d2d44; z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        
        /* Kelime Modülü Stilleri */
        .word-card { border-left: 4px solid var(--purple); padding-left: 15px; margin-bottom: 20px; }
        .word-title { color: var(--purple); font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .word-meaning { font-size: 14px; color: var(--text); margin-bottom: 5px; }
        .word-example { font-size: 13px; font-style: italic; color: var(--text-muted); border-top: 1px solid #2d2d44; padding-top: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="screen active" id="homeScreen">
        <h2 style="color:var(--accent)">Gelişim Paneli</h2>
        
        <div class="card" onclick="showScreen('wordScreen')" style="background: linear-gradient(45deg, #16162d, #2e1a47); border: 1px solid var(--purple);">
            <h4 style="margin:0">📚 Günün Kelimeleri</h4>
            <p style="font-size: 12px; color: var(--text-muted); margin: 5px 0 0 0;">Kelime haznene bugün 3 yeni güç ekle.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="card" onclick="showScreen('exerciseScreen')" style="text-align:center;">🏋️‍♂️<br><small>Egzersiz</small></div>
            <div class="card" onclick="showScreen('dictionScreen')" style="text-align:center;">🗣️<br><small>Diksiyon</small></div>
            <div class="card" onclick="showScreen('logicScreen')" style="text-align:center;">⚡<br><small>Zeka</small></div>
            <div class="card" onclick="showScreen('confidenceScreen')" style="text-align:center;">💎<br><small>Özgüven</small></div>
        </div>
    </div>

    <div class="screen" id="wordScreen">
        <button onclick="showScreen('homeScreen')" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:10px;">← Geri</button>
        <h2>Günün Kelimeleri</h2>
        <div id="wordListBody">
            </div>
        <button class="btn" style="background: var(--purple);" onclick="refreshWords()">Yarınki Kelimeleri Göster (Demo)</button>
    </div>

    <div class="screen" id="businessScreen">
        <h2>BusinessForge</h2>
        <div class="card">
            <div style="display:flex; gap:10px;"><input type="number" id="w" placeholder="En"><input type="number" id="h" placeholder="Boy"></div>
            <select id="mType" onchange="syncPrice()"></select>
            <input type="number" id="uPrice" placeholder="₺/m²">
            <button class="btn" onclick="calculate()">HESAPLA</button>
            <div id="finalRes" style="text-align:center; font-size:32px; color:var(--success); font-weight:bold; margin-top:15px;">0₺</div>
        </div>
    </div>

    <div class="screen" id="settingsScreen">
        <h2>Ayarlar</h2>
        <div class="card">
            <label>Şeffaf m²</label><input type="number" id="set_trans" oninput="saveConfig()">
            <label>Renkli m²</label><input type="number" id="set_color" oninput="saveConfig()">
            <label>Sabit Gider (₺)</label><input type="number" id="set_fixed" oninput="saveConfig()">
        </div>
        <button class="btn" style="background:var(--danger)" onclick="resetSystem()">SIFIRLA</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showScreen('homeScreen', this)">🏠</div>
        <div class="nav-item" onclick="showScreen('businessScreen', this)">📊</div>
        <div class="nav-item" onclick="showScreen('settingsScreen', this)">⚙️</div>
    </div>
</div>

<script>
    let config = { trans: 450, color: 600, fixed: 50 };

    // --- KELİME VERİSİ ---
    const allWords = [
        { word: "Liyakat", meaning: "Bir işe layık olma, yaraşma durumu.", example: "Atölyemizde liyakat sahibi ustalarla çalışmaya özen gösteriyoruz." },
        { word: "İntizam", bottom: "Düzenli olma, düzgünlük.", example: "Pleksi kesimlerinde yakaladığımız intizam, ürün kalitemizi artırıyor." },
        { word: "Nezaket", meaning: "Başkalarına karşı saygılı ve ince davranma.", example: "Müşterilerimizle kurduğumuz nezaket odaklı iletişim, güvenimizi tazeliyor." },
        { word: "Dirayet", meaning: "Güçlüklerin üstesinden gelme yeteneği, akıllılık.", example: "Sipariş yoğunluğunda gösterdiğimiz dirayet sayesinde hiçbir işi aksatmadık." },
        { word: "Maharet", meaning: "Elinden iş gelme, beceriklilik.", example: "UV baskıdaki maharetimiz, ürünlerin görselliğini bir üst seviyeye taşıyor." },
        { word: "Muvaffakiyet", meaning: "Başarı.", example: "Yeni tasarımlarımızla sektörde büyük bir muvaffakiyet elde ettik." }
    ];

    function renderWords() {
        const body = document.getElementById('wordListBody');
        // Her gün farklı 3 kelime seçme mantığı (basit rastgelelik)
        const shuffled = [...allWords].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 3);

        body.innerHTML = selected.map(w => `
            <div class="card word-card">
                <div class="word-title">${w.word}</div>
                <div class="word-meaning"><strong>Anlamı:</strong> ${w.meaning}</div>
                <div class="word-example"><strong>Örnek:</strong> "${w.example}"</div>
            </div>
        `).join('');
    }

    function refreshWords() {
        renderWords();
        window.scrollTo(0,0);
    }

    // --- TEMEL SİSTEM ---
    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'wordScreen') renderWords();
    }

    function saveConfig() {
        config = {
            trans: document.getElementById('set_trans').value || 450,
            color: document.getElementById('set_color').value || 600,
            fixed: document.getElementById('set_fixed').value || 50
        };
        localStorage.setItem('mf_master_config', JSON.stringify(config));
        updateBusinessUI();
    }

    function updateBusinessUI() {
        const sel = document.getElementById('mType');
        if(sel) {
            sel.innerHTML = `<option value="${config.trans}">Şeffaf (${config.trans}₺)</option><option value="${config.color}">Renkli (${config.color}₺)</option>`;
            document.getElementById('uPrice').value = sel.value;
        }
    }

    function syncPrice() { document.getElementById('uPrice').value = document.getElementById('mType').value; }
    
    function calculate() {
        const w = parseFloat(document.getElementById('w').value) || 0;
        const h = parseFloat(document.getElementById('h').value) || 0;
        const final = (((w * h) / 10000) * document.getElementById('uPrice').value) + parseFloat(config.fixed);
        document.getElementById('finalRes').innerText = Math.round(final) + "₺";
    }

    window.onload = () => {
        const saved = localStorage.getItem('mf_master_config');
        if(saved) config = JSON.parse(saved);
        document.getElementById('set_trans').value = config.trans;
        document.getElementById('set_color').value = config.color;
        document.getElementById('set_fixed').value = config.fixed;
        updateBusinessUI();
    };

    function resetSystem() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
