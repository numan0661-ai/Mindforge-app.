<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UV Akademi Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #06b6d4;
            --bg: #0b0b1a;
            --surface: #16162d;
            --surface-light: #1e1e3f;
            --text: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --gold: #f59e0b;
            --purple: #a855f7;
            --uv: #bf00ff;
            --danger: #ef4444;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 100px;
            line-height: 1.6;
        }
        
        .app-container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 15px; 
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .header {
            background: linear-gradient(135deg, var(--surface), var(--surface-light));
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(191, 0, 255, 0.3);
        }
        
        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .btn:active { transform: scale(0.95); opacity: 0.9; }
        .btn-secondary { background: var(--surface-light); border: 1px solid rgba(255,255,255,0.1); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); }
        
        .filter-btn {
            display: inline-block;
            padding: 10px 16px;
            margin: 4px;
            background: var(--surface);
            border: 2px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .filter-btn:active { transform: scale(0.92); }
        .filter-btn.active { background: var(--uv) !important; color: white !important; border-color: var(--uv) !important; }
        
        .shortcut-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .shortcut-card:active { transform: scale(0.98); border-color: var(--accent); }
        
        .shortcut-key {
            display: inline-block;
            background: var(--bg);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            color: var(--gold);
            border: 1px solid var(--gold);
            margin-right: 10px;
        }
        
        .category-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .badge-uv { background: rgba(191, 0, 255, 0.2); color: var(--uv); }
        .badge-critical { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-corel { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 22, 45, 0.98);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 25px;
            border-top: 1px solid #2d2d44;
            z-index: 1000;
        }
        
        .nav-item {
            font-size: 28px;
            padding: 10px 30px;
            cursor: pointer;
            opacity: 0.5;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .nav-item:active { transform: scale(0.85); opacity: 0.8; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        
        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #2d2d44;
            background: var(--bg);
            color: white;
            font-size: 15px;
        }
        
        input:focus { outline: none; border-color: var(--uv); }
        
        .hidden { display: none !important; }
        .flex-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--surface);
            border: 3px solid var(--uv);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- ANA EKRAN -->
    <div class="screen active" id="homeScreen">
        <div class="header">
            <h2 style="color:var(--uv); margin-bottom:10px;">🎓 UV Akademi Pro</h2>
            <p style="color:var(--text-muted); font-size:14px;">Profesyonel UV Baskı & CorelDRAW Eğitimi</p>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;">
            <div id="btnUvAkademi" style="background:linear-gradient(135deg, #16162d, #3b0066); border:2px solid var(--uv); border-radius:20px; padding:30px; text-align:center; cursor:pointer;">
                <div style="font-size:48px; margin-bottom:10px;">🧪</div>
                <div style="font-size:18px; font-weight:bold;">UV AKADEMİ</div>
                <div style="font-size:12px; color:var(--text-muted);">8 Modül • Sertifikalı</div>
            </div>
            <div id="btnCorelDraw" style="background:linear-gradient(135deg, #16162d, #1e1b4b); border:2px solid var(--primary); border-radius:20px; padding:30px; text-align:center; cursor:pointer;">
                <div style="font-size:48px; margin-bottom:10px;">⌨️</div>
                <div style="font-size:18px; font-weight:bold;">CORELDRAW</div>
                <div style="font-size:12px; color:var(--text-muted);">95+ Kısayol</div>
            </div>
        </div>
    </div>

    <!-- CORELDRAW EKRANI -->
    <div class="screen" id="corelScreen">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
            <button id="btnBack" class="btn btn-secondary">← Geri</button>
            <h2 style="color:var(--accent); margin:0;">⌨️ CorelDRAW Kısayolları</h2>
        </div>
        
        <input type="text" id="searchInput" placeholder="🔍 Kısayol ara..." style="margin-bottom:15px;">
        
        <div class="flex-wrap" style="margin-bottom:20px;">
            <button class="filter-btn active" data-filter="all">Tümü</button>
            <button class="filter-btn" data-filter="uv" style="border-color:var(--uv); color:var(--uv);">UV Özel</button>
            <button class="filter-btn" data-filter="critical" style="border-color:var(--danger); color:var(--danger);">Kritik</button>
            <button class="filter-btn" data-filter="file">Dosya</button>
            <button class="filter-btn" data-filter="edit">Düzenle</button>
        </div>
        
        <div id="shortcutsList"></div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" data-nav="homeScreen">🏠</div>
    <div class="nav-item" data-nav="corelScreen">⌨️</div>
</div>

<script>
const shortcuts = [
    { key: "Ctrl+Q", desc: "Eğriye Çevir", category: "uv", context: "Fontları vektöre çevirme", critical: true },
    { key: "Ctrl+End", desc: "En Alta Gönder", category: "uv", context: "Beyaz katmanı en alta", critical: true },
    { key: "Ctrl+Home", desc: "En Üste Getir", category: "uv", context: "Varnish katmanını üste", critical: true },
    { key: "Shift+F11", desc: "Tek Renk Dolgu", category: "uv", context: "RD_WHITE spot rengi", critical: true },
    { key: "Ctrl+E", desc: "Dışa Aktar", category: "uv", context: "PDF/X-4 export", critical: true },
    { key: "Ctrl+N", desc: "Yeni Belge", category: "file", context: "Yeni dosya açma" },
    { key: "Ctrl+S", desc: "Kaydet", category: "file", context: "Dosyayı kaydetme" },
    { key: "Ctrl+O", desc: "Aç", category: "file", context: "Dosya açma" },
    { key: "Ctrl+Z", desc: "Geri Al", category: "edit", context: "Son işlemi geri alma" },
    { key: "Ctrl+C", desc: "Kopyala", category: "edit", context: "Seçili nesneyi kopyalama" },
    { key: "Ctrl+V", desc: "Yapıştır", category: "edit", context: "Kopyalananı yapıştırma" },
];

let currentFilter = 'all';

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(screenId);
    if (target) target.classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.classList.remove('active');
        if (nav.dataset.nav === screenId) nav.classList.add('active');
    });
}

function renderShortcuts() {
    const list = document.getElementById('shortcutsList');
    if (!list) return;
    
    let filtered = shortcuts;
    if (currentFilter !== 'all') {
        if (currentFilter === 'critical') filtered = shortcuts.filter(s => s.critical);
        else if (currentFilter === 'uv') filtered = shortcuts.filter(s => s.category === 'uv');
        else filtered = shortcuts.filter(s => s.category === currentFilter);
    }
    
    const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
    if (search) {
        filtered = filtered.filter(s => 
            s.key.toLowerCase().includes(search) || 
            s.desc.toLowerCase().includes(search)
        );
    }
    
    let html = '';
    filtered.forEach(s => {
        const badgeClass = s.category === 'uv' ? 'badge-uv' : s.critical ? 'badge-critical' : 'badge-corel';
        const badgeText = s.category === 'uv' ? 'UV' : s.critical ? 'KRİTİK' : 'COREL';
        
        html += `
            <div class="shortcut-card" data-key="${s.key}" data-desc="${s.desc}" data-context="${s.context}">
                <span class="category-badge ${badgeClass}">${badgeText}</span>
                <div style="margin-top:8px;">
                    <span class="shortcut-key">${s.key}</span>
                    <span style="color:var(--text);">${s.desc}</span>
                </div>
                <div style="margin-top:8px; font-size:12px; color:var(--text-muted); font-style:italic;">
                    💡 ${s.context}
                </div>
            </div>
        `;
    });
    
    list.innerHTML = html || '<p style="text-align:center; color:var(--text-muted); padding:40px;">Sonuç bulunamadı</p>';
}

function showModal(key, desc, context) {
    const old = document.querySelector('.modal-overlay');
    if (old) old.remove();
    
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <div style="font-size:48px; margin-bottom:15px;">⌨️</div>
            <div style="font-size:28px; font-family:monospace; color:var(--gold); margin-bottom:15px; font-weight:bold;">${key}</div>
            <div style="font-size:20px; color:var(--text); margin-bottom:10px; font-weight:600;">${desc}</div>
            <div style="font-size:14px; color:var(--accent); margin-bottom:25px; font-style:italic;">💡 ${context}</div>
            <button id="btnCloseModal" class="btn" style="width:100%;">Kapat</button>
        </div>
    `;
    document.body.appendChild(modal);
}

document.addEventListener('DOMContentLoaded', function() {
    
    // Ana ekran butonları
    document.getElementById('btnUvAkademi')?.addEventListener('click', () => alert('UV Akademi yapım aşamasında'));
    document.getElementById('btnCorelDraw')?.addEventListener('click', () => { showScreen('corelScreen'); renderShortcuts(); });
    document.getElementById('btnBack')?.addEventListener('click', () => showScreen('homeScreen'));
    
    // Navigasyon
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            const screen = this.dataset.nav;
            showScreen(screen);
            if (screen === 'corelScreen') renderShortcuts();
        });
    });
    
    // Filtre butonları - Event Delegation
    document.querySelector('.flex-wrap')?.addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter || 'all';
        renderShortcuts();
    });
    
    // Arama
    document.getElementById('searchInput')?.addEventListener('input', renderShortcuts);
    
    // Shortcut kartları - Event Delegation
    document.getElementById('shortcutsList')?.addEventListener('click', function(e) {
        const card = e.target.closest('.shortcut-card');
        if (!card) return;
        showModal(card.dataset.key, card.dataset.desc, card.dataset.context);
    });
    
    // Modal kapatma - Event Delegation
    document.addEventListener('click', function(e) {
        if (e.target.id === 'btnCloseModal' || e.target.classList.contains('modal-overlay')) {
            document.querySelector('.modal-overlay')?.remove();
        }
    });
    
    console.log('UV Akademi Pro - Hazır');
});
</script>

</body>
</html>
