<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0b1a">
    <meta name="description" content="UV Baskı ve Tasarım Eğitim Platformu">
    <title>MindForge UV Master Pro</title>
    <style>
        /* 1. CSS DEĞİŞKENLERİ VE GENEL AYARLAR */
        :root {
            --primary: #6366f1;
            --accent: #06b6d4;
            --bg: #0b0b1a;
            --surface: #16162d;
            --surface-light: #1e1e3f;
            --text: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --gold: #f59e0b;
            --uv: #bf00ff;
            --danger: #ef4444;
            --corel: #ff6600;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-glow: 0 0 20px rgba(191, 0, 255, 0.2);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* 2. DÜZEN VE KONTEYNER (Responsive Yapı) */
        .app-container {
            width: 100%;
            max-width: 500px; /* Tablet uyumu için biraz genişletildi */
            padding: 20px;
            padding-bottom: 100px;
            position: relative;
        }

        /* 3. EKRAN YÖNETİMİ */
        .screen { 
            display: none; 
            animation: fadeIn var(--transition);
        }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 4. KOMPONENT STİLLERİ (Satır içi stiller buraya taşındı) */
        .card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: var(--transition);
        }
        .card:hover { border-color: var(--uv); box-shadow: var(--shadow-glow); }

        .page-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn {
            background: var(--surface-light);
            border: none; color: var(--text);
            width: 40px; height: 40px; border-radius: var(--radius-md);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; color: var(--gold); margin-bottom: 8px; }
        .input-field {
            width: 100%; background: var(--surface-light); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: var(--radius-md); font-size: 16px;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: var(--radius-lg); border: none;
            font-weight: 700; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent)); color: white;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: var(--surface-light); border: 1px solid rgba(255,255,255,0.1); }

        /* Alt Navigasyon */
        .nav-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; background: rgba(22, 22, 45, 0.95);
            display: flex; justify-content: space-around; padding: 15px 0 25px;
            backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.5; transition: var(--transition); }
        .nav-item.active { opacity: 1; color: var(--uv); transform: translateY(-5px); }

        /* CorelDRAW & Quiz Spesifik */
        .shortcut-card {
            background: rgba(255, 102, 0, 0.05); border: 1px solid rgba(255, 102, 0, 0.2);
            padding: 15px; border-radius: var(--radius-md); margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .key-badge { background: var(--corel); padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; }

        .history-list { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .history-item { font-size: 13px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="app-container">
        <main id="screen-home" class="screen active" aria-label="Ana Ekran">
            <div class="page-header">
                <h2>MindForge UV</h2>
            </div>
            
            <div class="card">
                <h3 style="color: var(--gold); margin-bottom: 10px;">🚀 Öğrenmeye Başla</h3>
                <p style="color: var(--text-muted); font-size: 14px;">UV Baskı teknikleri ve CorelDRAW uzmanlığı için modülleri takip et.</p>
                <button class="btn" style="margin-top: 15px;" data-nav="screen-learn">Eğitime Git</button>
            </div>

            <div class="card">
                <h3 style="color: var(--accent); margin-bottom: 10px;">🧮 Maliyet Hesapla</h3>
                <div class="input-group">
                    <label for="calc-m2">Baskı Alanı (m²)</label>
                    <input type="number" id="calc-m2" class="input-field" placeholder="Örn: 0.5" step="0.01">
                </div>
                <button id="btn-calculate" class="btn">Hesapla</button>
                <div id="calc-result" style="margin-top: 15px; font-weight: bold; color: var(--success); text-align: center;"></div>
            </div>
        </main>

        <section id="screen-learn" class="screen" aria-label="Eğitim Ekranı">
            <div class="page-header">
                <button class="back-btn" data-nav="screen-home" aria-label="Geri Dön">←</button>
                <h2>Eğitim Modülleri</h2>
            </div>
            
            <div class="card">
                <div class="shortcut-card">
                    <div>
                        <div style="font-weight: bold;">Hizalama (Merkez)</div>
                        <div style="font-size: 12px; color: var(--text-muted);">Seçili objeleri sayfaya ortalar</div>
                    </div>
                    <span class="key-badge">P</span>
                </div>
                <div class="shortcut-card">
                    <div>
                        <div style="font-weight: bold;">Gruplandır</div>
                        <div style="font-size: 12px; color: var(--text-muted);">Objeleri birleştirir</div>
                    </div>
                    <span class="key-badge">Ctrl + G</span>
                </div>
            </div>

            <div class="card">
                <h3 style="color: var(--uv); margin-bottom: 12px;">📜 Hesaplama Geçmişi</h3>
                <div id="history-container" class="history-list">
                    <p style="text-align: center; color: var(--text-muted);">Kayıt bulunamadı.</p>
                </div>
            </div>
        </section>

        <nav class="nav-bar">
            <div class="nav-item active" data-nav="screen-home" title="Ana Sayfa">🏠</div>
            <div class="nav-item" data-nav="screen-learn" title="Eğitim">🎓</div>
            <div class="nav-item" data-nav="screen-settings" title="Ayarlar">⚙️</div>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. STATE & CONSTANTS ---
            const state = {
                currentPrice: 450, // m2 birim fiyatı
                history: JSON.parse(localStorage.getItem('uv_history') || '[]')
            };

            // --- 2. SELECTORS ---
            const screens = document.querySelectorAll('.screen');
            const navItems = document.querySelectorAll('.nav-item, [data-nav]');
            const btnCalculate = document.getElementById('btn-calculate');
            const inputM2 = document.getElementById('calc-m2');
            const resultDisplay = document.getElementById('calc-result');
            const historyContainer = document.getElementById('history-container');

            // --- 3. CORE FUNCTIONS ---

            // Güvenli Sayfa Geçişi
            const navigateTo = (screenId) => {
                screens.forEach(s => s.classList.remove('active'));
                const target = document.getElementById(screenId);
                if (target) {
                    target.classList.add('active');
                    // Nav ikonlarını güncelle
                    document.querySelectorAll('.nav-item').forEach(item => {
                        item.classList.toggle('active', item.dataset.nav === screenId);
                    });
                }
            };

            // Veri Doğrulamalı Hesaplama
            const calculateMaliyet = () => {
                const m2 = parseFloat(inputM2.value);
                
                // Hata Yönetimi: Boş veya negatif değer kontrolü
                if (isNaN(m2) || m2 <= 0) {
                    alert("Lütfen geçerli bir m² değeri giriniz!");
                    return;
                }

                const total = m2 * state.currentPrice;
                const formattedResult = `Toplam Maliyet: ${total.toLocaleString('tr-TR', {style: 'currency', currency: 'TRY'})}`;
                
                resultDisplay.textContent = formattedResult;
                
                // Geçmişe Kaydet
                saveToHistory(m2, total);
            };

            // LocalStorage Hata Yönetimi
            const saveToHistory = (m2, total) => {
                const entry = {
                    id: Date.now(),
                    date: new Date().toLocaleTimeString(),
                    m2: m2,
                    total: total
                };

                state.history.unshift(entry);
                if (state.history.length > 10) state.history.pop(); // Son 10 kayıt

                try {
                    localStorage.setItem('uv_history', JSON.stringify(state.history));
                    renderHistory();
                } catch (e) {
                    console.error("Veri kaydedilemedi:", e);
                }
            };

            const renderHistory = () => {
                if (state.history.length === 0) return;
                
                historyContainer.innerHTML = state.history.map(item => `
                    <div class="history-item">
                        <strong>${item.date}</strong> - ${item.m2} m²: 
                        <span style="color: var(--success)">${item.total.toFixed(2)} TL</span>
                    </div>
                `).join('');
            };

            // --- 4. EVENT LISTENERS (Modern Yöntem) ---
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    const target = e.currentTarget.dataset.nav;
                    if (target) navigateTo(target);
                });
            });

            btnCalculate.addEventListener('click', calculateMaliyet);

            // Uygulama Başlatma
            renderHistory();
        });
    </script>
</body>
</html>
