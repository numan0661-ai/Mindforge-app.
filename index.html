<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindForge Master</title>
    <style>
        :root {
            --primary: #6366f1; --accent: #06b6d4; --bg: #0b0b1a;
            --surface: #16162d; --text: #ffffff; --text-muted: #94a3b8;
            --success: #10b981; --gold: #f59e0b; --purple: #a855f7; --danger: #ef4444; --corel: #4caf50;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 95px; }
        .app-container { max-width: 430px; margin: 0 auto; padding: 15px; }
        
        /* Ekranlar */
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Kart Yapısı */
        .card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Butonlar ve Inputlar */
        .btn { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; margin-top: 5px; }
        .btn:active { transform: scale(0.98); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #2d2d44; background: #0b0b1a; color: white; box-sizing: border-box; }
        label { font-size: 12px; color: var(--text-muted); margin-left: 5px; }

        /* Navigasyon */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22, 22, 45, 0.96); display: flex; justify-content: space-around; padding: 15px 0 25px; backdrop-filter: blur(10px); border-top: 1px solid #2d2d44; z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent); }

        /* Takvim */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .cal-day.done { background: var(--success); color: white; font-weight: bold; }
        .cal-day.today { border: 1px solid var(--accent); }

        /* Egzersiz Görsel */
        .ex-img { width: 100%; height: 120px; border-radius: 12px; margin: 10px 0; object-fit: cover; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="screen active" id="homeScreen">
        <h2 style="color:var(--accent)">MindForge Master</h2>
        <div class="card" onclick="showScreen('exerciseScreen')">
            <h4 style="margin:0">📆 Antrenman Takvimi</h4>
            <div class="calendar-grid" id="mainCalendar"></div>
        </div>
        <div class="grid-2">
            <div class="card" onclick="showScreen('corelScreen')" style="text-align:center; border:1px solid var(--corel)">🎨<br><small>CorelMaster</small></div>
            <div class="card" onclick="showScreen('wordScreen')" style="text-align:center; border:1px solid var(--purple)">📚<br><small>Kelimeler</small></div>
            <div class="card" onclick="showScreen('dictionScreen')" style="text-align:center;">🗣️<br><small>Diksiyon</small></div>
            <div class="card" onclick="showScreen('logicScreen')" style="text-align:center;">⚡<br><small>Zeka</small></div>
            <div class="card" onclick="showScreen('confidenceScreen')" style="text-align:center;">💎<br><small>Özgüven</small></div>
            <div class="card" onclick="showScreen('mentalScreen')" style="text-align:center;">🧘‍♂️<br><small>Mental</small></div>
        </div>
    </div>

    <div class="screen" id="exerciseScreen">
        <button class="btn" style="background:none; color:var(--accent); text-align:left; padding:0;" onclick="showScreen('homeScreen')">← Geri</button>
        <div class="grid-2" style="margin: 15px 0;">
            <button class="btn" onclick="toggleExSub('workout')">Program</button>
            <button class="btn" style="background:var(--purple);" onclick="toggleExSub('measure')">Ölçüler</button>
        </div>
        <div id="workoutSub">
            <div class="card">
                <h4 id="exTitle" style="color:var(--gold); margin:0;">Program</h4>
                <div id="exListBody"></div>
                <button class="btn" onclick="logWorkout()">Bugünü Tamamla ✅</button>
            </div>
        </div>
        <div id="measureSub" style="display:none;">
            <div class="card">
                <h4>Ölçü Kaydet</h4>
                <input type="number" id="m_kilo" placeholder="Kilo (kg)">
                <input type="number" id="m_kol" placeholder="Kol (cm)">
                <button class="btn" style="background:var(--purple)" onclick="saveMeasures()">Kaydet</button>
            </div>
            <div class="card" id="measureList"></div>
        </div>
    </div>

    <div class="screen" id="corelScreen">
        <button class="btn" style="background:none; color:var(--accent); text-align:left; padding:0;" onclick="showScreen('homeScreen')">← Geri</button>
        <h2>Corel Master</h2>
        <div class="card">
            <h4 style="color:var(--gold); margin:0 0 10px 0;">⚡ Kısayol Yarışması</h4>
            <div id="quizQuestion" style="margin-bottom:10px;">Soru Bekleniyor...</div>
            <div id="quizOptions" class="grid-2"></div>
        </div>
    </div>

    <div class="screen" id="wordScreen">
        <button class="btn" style="background:none; color:var(--accent); text-align:left; padding:0;" onclick="showScreen('homeScreen')">← Geri</button>
        <h2>Günün Kelimeleri</h2>
        <div id="wordListBody"></div>
    </div>

    <div class="screen" id="businessScreen">
        <h2>BusinessForge</h2>
        <div class="card">
            <label>Ölçüler (cm)</label>
            <div class="grid-2">
                <input type="number" id="w" placeholder="En">
                <input type="number" id="h" placeholder="Boy">
            </div>
            <label>Malzeme</label>
            <select id="mType" onchange="syncPrice()"></select>
            <input type="number" id="uPrice" placeholder="₺/m²">
            <button class="btn" onclick="calculate()">HESAPLA</button>
            <h2 id="finalRes" style="text-align:center; color:var(--success); margin-top:20px;">0₺</h2>
        </div>
    </div>

    <div class="screen" id="settingsScreen">
        <h2>Ayarlar</h2>
        <div class="card">
            <label>Şeffaf m² (₺)</label><input type="number" id="set_trans" oninput="saveConfig()">
            <label>Renkli m² (₺)</label><input type="number" id="set_color" oninput="saveConfig()">
            <label>Sabit Gider (₺)</label><input type="number" id="set_fixed" oninput="saveConfig()">
        </div>
        <button class="btn" style="background:var(--danger)" onclick="resetSystem()">Sıfırla</button>
    </div>

    <div class="screen" id="dictionScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><h2>Diksiyon</h2></div>
    <div class="screen" id="logicScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><h2>Zeka</h2></div>
    <div class="screen" id="confidenceScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><h2>Özgüven</h2></div>
    <div class="screen" id="mentalScreen"><button class="btn" onclick="showScreen('homeScreen')">Geri</button><h2>Mental</h2></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showScreen('homeScreen', this)">🏠</div>
        <div class="nav-item" onclick="showScreen('businessScreen', this)">📊</div>
        <div class="nav-item" onclick="showScreen('settingsScreen', this)">⚙️</div>
    </div>
</div>

<script>
    // --- DATA & CONFIG ---
    let config = { trans: 450, color: 600, fixed: 50 };
    let workoutHistory = JSON.parse(localStorage.getItem('mf_workout_history')) || [];
    let measures = JSON.parse(localStorage.getItem('mf_measures')) || [];

    // --- EKRAN YÖNETİMİ ---
    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el && el.classList.contains('nav-item')) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'homeScreen') renderCalendar();
        if(id === 'exerciseScreen') renderWorkout();
        if(id === 'corelScreen') initQuiz();
        if(id === 'wordScreen') renderWords();
    }

    // --- EGZERSİZ & TAKVİM ---
    function toggleExSub(sub) {
        document.getElementById('workoutSub').style.display = sub === 'workout' ? 'block' : 'none';
        document.getElementById('measureSub').style.display = sub === 'measure' ? 'block' : 'none';
        if(sub === 'measure') renderMeasures();
    }

    const exData = [
        { t: "İtiş Günü", m: [{ n: "Şınav", r: "4x12", g: "https://media.giphy.com/media/26ueYUlPAmUkTBAM8/giphy.gif" }] },
        { t: "Çekiş Günü", m: [{ n: "Barfiks", r: "3xMax", g: "https://media.giphy.com/media/3o7TKLJ3KL3lG3L9Gg/giphy.gif" }] }
    ];

    function renderWorkout() {
        const d = exData[new Date().getDay() % 2];
        document.getElementById('exTitle').innerText = d.t;
        document.getElementById('exListBody').innerHTML = d.m.map(i => `
            <div style="margin-top:10px; border-bottom:1px solid #333; padding-bottom:10px;">
                <img src="${i.g}" class="ex-img" onerror="this.src='https://via.placeholder.com/150?text=Fitness'">
                <b>${i.n}</b> - ${i.r}
            </div>
        `).join('');
    }

    function logWorkout() {
        const d = new Date().toLocaleDateString('tr-TR');
        if(!workoutHistory.includes(d)) {
            workoutHistory.push(d);
            localStorage.setItem('mf_workout_history', JSON.stringify(workoutHistory));
            alert("Takvime işlendi! 🔥");
            renderCalendar();
        } else alert("Zaten tamamladın!");
    }

    function renderCalendar() {
        const cal = document.getElementById('mainCalendar');
        cal.innerHTML = "";
        const now = new Date();
        const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const dateStr = new Date(now.getFullYear(), now.getMonth(), i).toLocaleDateString('tr-TR');
            const dayDiv = document.createElement('div');
            dayDiv.className = `cal-day ${workoutHistory.includes(dateStr) ? 'done' : ''} ${i === now.getDate() ? 'today' : ''}`;
            dayDiv.innerText = i;
            cal.appendChild(dayDiv);
        }
    }

    // --- ÖLÇÜLER ---
    function saveMeasures() {
        const m = { d: new Date().toLocaleDateString('tr-TR'), k: document.getElementById('m_kilo').value, c: document.getElementById('m_kol').value };
        measures.unshift(m);
        localStorage.setItem('mf_measures', JSON.stringify(measures));
        renderMeasures();
        alert("Kaydedildi!");
    }
    function renderMeasures() {
        document.getElementById('measureList').innerHTML = measures.slice(0,5).map(m => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #333; font-size:13px;">
                <span>${m.d}</span><span>${m.k}kg / ${m.c}cm</span>
            </div>
        `).join('');
    }

    // --- COREL QUIZ ---
    const corelQ = [{q: "Gruplama?", a: "Ctrl+G", o: ["Ctrl+G", "Ctrl+U", "Ctrl+K", "Ctrl+L"]}, {q: "Merkezle?", a: "P", o: ["P", "C", "E", "M"]}];
    function initQuiz() {
        const q = corelQ[Math.floor(Math.random()*corelQ.length)];
        document.getElementById('quizQuestion').innerText = q.q;
        document.getElementById('quizOptions').innerHTML = q.o.map(o => `<div class="btn" style="background:var(--bg); border:1px solid #333;" onclick="checkQ('${o}','${q.a}')">${o}</div>`).join('');
    }
    function checkQ(s, a) { alert(s===a ? "Doğru!" : "Yanlış!"); initQuiz(); }

    // --- KELİMELER ---
    const words = [{w: "Liyakat", m: "Layık olma."}, {w: "İntizam", m: "Düzen."}];
    function renderWords() {
        document.getElementById('wordListBody').innerHTML = words.map(w => `<div class="card"><b>${w.w}:</b> ${w.m}</div>`).join('');
    }

    // --- BUSINESS & SETTINGS ---
    function saveConfig() {
        config = { trans: document.getElementById('set_trans').value, color: document.getElementById('set_color').value, fixed: document.getElementById('set_fixed').value };
        localStorage.setItem('mf_master_config', JSON.stringify(config));
        updateUI();
    }
    function updateUI() {
        const sel = document.getElementById('mType');
        sel.innerHTML = `<option value="${config.trans}">Şeffaf</option><option value="${config.color}">Renkli</option>`;
        syncPrice();
    }
    function syncPrice() { document.getElementById('uPrice').value = document.getElementById('mType').value; }
    function calculate() {
        const w = document.getElementById('w').value, h = document.getElementById('h').value;
        const res = (((w*h)/10000)*document.getElementById('uPrice').value) + parseFloat(config.fixed);
        document.getElementById('finalRes').innerText = Math.round(res) + "₺";
    }

    window.onload = () => {
        const s = localStorage.getItem('mf_master_config'); if(s) config = JSON.parse(s);
        document.getElementById('set_trans').value = config.trans;
        document.getElementById('set_color').value = config.color;
        document.getElementById('set_fixed').value = config.fixed;
        updateUI(); renderCalendar();
    };
    function resetSystem() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
