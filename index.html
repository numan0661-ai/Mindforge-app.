<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindForge Master</title>

<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MindForge">

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

header{
text-align:center;
padding:15px;
background:#111;
}

.page{display:none;padding-bottom:80px}
.active{display:block}

.card{
background:#111;
margin:10px;
padding:15px;
border-radius:10px;
border:1px solid #333;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.btn{
background:#1b1b1b;
padding:20px;
border-radius:10px;
text-align:center;
border:1px solid #444;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
}

.progress{
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:lime;
width:0%;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
background:black;
color:white;
border:1px solid #333;
}

.machine{
height:200px;
background:#222;
position:relative;
}

.head{
width:40px;
height:40px;
background:red;
position:absolute;
top:60px;
left:0;
animation:move 3s infinite alternate;
}

@keyframes move{

0%{left:0}
100%{left:80%}

}

</style>
</head>


<body>


<header>MindForge Master</header>


<!-- HOME -->

<div id="home" class="page active">

<div class="card">

Seviye <span id="lvl"></span>

<div class="progress">

<div id="bar" class="bar"></div>

</div>

<p id="xpText"></p>

</div>


<div class="grid">

<div class="btn" onclick="go('academy')">UV Akademi</div>

<div class="btn" onclick="go('corel')">Corel</div>

<div class="btn" onclick="go('fault')">Arıza</div>

<div class="btn" onclick="go('machine')">Makine</div>

<div class="btn" onclick="go('calc')">Maliyet</div>

<div class="btn" onclick="go('train')">Egzersiz</div>

</div>

</div>



<div id="academy" class="page"></div>
<div id="corel" class="page"></div>
<div id="fault" class="page"></div>
<div id="machine" class="page"></div>
<div id="calc" class="page"></div>
<div id="train" class="page"></div>



<nav>

<div onclick="go('home')">🏠</div>
<div onclick="go('academy')">📚</div>
<div onclick="go('fault')">⚠</div>
<div onclick="go('calc')">💰</div>

</nav>



<script>


let data={xp:0,level:1,lesson:0}

if(localStorage.mindforge){

data=JSON.parse(localStorage.mindforge)

}

function save(){

localStorage.mindforge=
JSON.stringify(data)

}


function go(p){

document
.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"))

document
.getElementById(p)
.classList.add("active")

update()

if(p=="academy")loadAcademy()
if(p=="corel")loadCorel()
if(p=="fault")loadFault()
if(p=="machine")loadMachine()
if(p=="calc")loadCalc()
if(p=="train")loadTrain()

}


function addXP(v){

data.xp+=v

if(data.xp>=100){

data.xp=0
data.level++

}

save()
update()

}


function update(){

lvl.innerText=data.level

xpText.innerText=data.xp+" / 100"

bar.style.width=data.xp+"%"

}



//// ACADEMY

let lessons=[
"UV nedir",
"Makine",
"Boya",
"Pleksi",
"Cam",
"Metal",
"Ayar",
"Sorun"
]

function loadAcademy(){

academy.innerHTML=""

lessons.forEach((l,i)=>{

let d=document.createElement("div")

d.className="card"

if(i>data.lesson)d.style.opacity=.3

d.innerText=l

d.onclick=()=>{

if(i>data.lesson)return

data.lesson++
addXP(20)
save()

}

academy.appendChild(d)

})

}



//// COREL

let corel=[
"Pick Tool",
"Zoom",
"Ctrl G",
"Ctrl Q",
"Ctrl D",
"Export",
"CMYK",
"300 DPI"
]

function loadCorel(){

corelDiv=""

corel.forEach(c=>{

corelDiv+=
"<div class='card'>"+c+"</div>"

})

corel.innerHTML=corelDiv

}



//// FAULT

let faults=[
"Nozzle",
"Soluk",
"UV",
"Motor",
"Fan",
"Pompa",
"Limit"
]

function loadFault(){

fault.innerHTML=""

faults.forEach(f=>{

fault.innerHTML+=
"<div class='card'>"+f+"</div>"

})

}



//// MACHINE

function loadMachine(){

machine.innerHTML=`

<div class="machine">

<div class="head"></div>

</div>

`

}



//// CALC

function loadCalc(){

calc.innerHTML=`

<input id="m1">
<input id="m2">
<input id="m3">
<input id="k">

<button onclick="calcPro()">Hesapla</button>

<p id="out"></p>

`

}


function calcPro(){

let a=parseFloat(m1.value||0)
let b=parseFloat(m2.value||0)
let c=parseFloat(m3.value||0)
let k=parseFloat(k.value||0)

let cost=a+b+c

let sell=cost+(cost*k/100)

out.innerText=
"Maliyet "+cost+
" Satış "+sell

}



//// TRAIN

function loadTrain(){

let l=data.level

train.innerHTML=`

<button onclick="addXP(10)">
Şınav ${5+l}
</button>

<button onclick="addXP(10)">
Mekik ${5+l}
</button>

`

}


update()

</script>


</body>
</html>
