<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MindForge UV Master</title>

<meta name="theme-color" content="#0b0b1a">

<style>

body{
font-family:system-ui;
background:#0b0b1a;
color:white;
margin:0;
padding:20px;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

.card{
background:#16162d;
padding:20px;
border-radius:12px;
margin-bottom:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
}

input{
padding:10px;
border-radius:8px;
border:none;
width:100%;
margin-top:8px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#16162d;
display:flex;
justify-content:space-around;
padding:12px;
}

</style>

</head>
<body>

<div id="home" class="screen active">

<h1>MindForge</h1>

<div class="card">
<h3>UV Akademi</h3>
<button onclick="show('academy')">Aç</button>
</div>

<div class="card">
<h3>Maliyet Hesapla</h3>
<button onclick="show('calc')">Hesapla</button>
</div>

</div>

<div id="academy" class="screen">

<h2>UV Akademi</h2>

<div class="card">
<p>UV baskı teknolojisi LED ışık ile anında kuruyan mürekkep kullanır.</p>
</div>

<button onclick="show('home')">Geri</button>

</div>

<div id="calc" class="screen">

<h2>Maliyet</h2>

<div class="card">

<label>En (cm)</label>
<input id="w" type="number">

<label>Boy (cm)</label>
<input id="h" type="number">

<label>m² fiyat</label>
<input id="p" type="number">

<button onclick="calc()">Hesapla</button>

<h3 id="result">0 ₺</h3>

</div>

<button onclick="show('home')">Geri</button>

</div>

<div class="nav">

<button onclick="show('home')">🏠</button>
<button onclick="show('academy')">📚</button>
<button onclick="show('calc')">📊</button>

</div>

<script>

function show(id){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function calc(){

let w=document.getElementById("w").value
let h=document.getElementById("h").value
let p=document.getElementById("p").value

let area=(w*h)/10000
let price=area*p

document.getElementById("result").innerText=price.toFixed(2)+" ₺"

}

function toast(t){

let d=document.createElement("div")
d.innerText=t
d.style.position="fixed"
d.style.top="20px"
d.style.left="50%"
d.style.transform="translateX(-50%)"
d.style.background="#16162d"
d.style.padding="10px 20px"
d.style.borderRadius="8px"

document.body.appendChild(d)

setTimeout(()=>{
d.remove()
},2000)

}

window.addEventListener("load",()=>{

toast("MindForge hazır")

})

</script>

<script>

if('serviceWorker' in navigator){

const swCode=`

self.addEventListener('install',e=>{
self.skipWaiting()
})

self.addEventListener('fetch',e=>{
e.respondWith(
caches.open('mindforge').then(cache=>{
return cache.match(e.request).then(r=>{
return r||fetch(e.request).then(res=>{
cache.put(e.request,res.clone())
return res
})
})
})
)
})

`

const blob=new Blob([swCode],{type:'text/javascript'})
const swURL=URL.createObjectURL(blob)

navigator.serviceWorker.register(swURL)

}

</script>

<script>

const manifest={
name:"MindForge UV Master",
short_name:"MindForge",
start_url:".",
display:"standalone",
background_color:"#0b0b1a",
theme_color:"#0b0b1a",
icons:[]
}

const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'})
const url=URL.createObjectURL(blob)

const link=document.createElement("link")
link.rel="manifest"
link.href=url

document.head.appendChild(link)

</script>

</body>
</html>
