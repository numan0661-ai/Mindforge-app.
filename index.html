<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UV Master Pro</title>

<style>

body{
font-family:system-ui;
background:#0b0b1a;
color:white;
margin:0;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
}

nav{
display:flex;
flex-wrap:wrap;
gap:6px;
padding:10px;
background:#16162d;
}

button{
padding:10px;
border:none;
background:#4f46e5;
color:white;
border-radius:6px;
cursor:pointer;
}

main{
padding:20px;
}

.card{
background:#16162d;
padding:15px;
margin:10px 0;
border-radius:8px;
}

.hidden{
display:none;
}

input{
display:block;
width:100%;
margin:5px 0 10px;
padding:8px;
border-radius:6px;
border:none;
}

ul{
list-style:none;
padding:0;
}

li{
background:#16162d;
padding:10px;
margin:5px 0;
border-radius:6px;
}

h2{
margin-top:0;
}

</style>
</head>

<body>

<header>UV Master Pro</header>

<nav>
<button onclick="show('home')">Ana Menü</button>
<button onclick="show('academy')">UV Akademi</button>
<button onclick="show('calc')">Maliyet</button>
<button onclick="show('orders')">Sipariş</button>
<button onclick="show('stock')">Stok</button>
<button onclick="show('report')">Rapor</button>
</nav>

<main>

<section id="home">
<h2>Kontrol Paneli</h2>

<div class="card">
Seviye: <span id="level">1</span>
</div>

<div class="card">
XP: <span id="xp">0</span>
</div>

</section>

<section id="academy" class="hidden">
<h2>UV Akademi</h2>

<div class="card">1. UV baskı temelleri</div>
<div class="card">2. Yüzey hazırlığı</div>
<div class="card">3. Corel hazırlık</div>
<div class="card">4. Makine operasyon</div>
<div class="card">5. Arıza tespiti</div>

</section>

<section id="calc" class="hidden">

<h2>Maliyet Hesaplama</h2>

<label>En cm</label>
<input id="w">

<label>Boy cm</label>
<input id="h">

<label>m² fiyat</label>
<input id="price">

<label>sabit maliyet</label>
<input id="fixed">

<button onclick="calculate()">Hesapla</button>

<h3 id="result"></h3>

</section>

<section id="orders" class="hidden">

<h2>Siparişler</h2>

<input id="orderName" placeholder="ürün">

<input id="orderPrice" placeholder="fiyat">

<button onclick="addOrder()">Ekle</button>

<ul id="orderList"></ul>

</section>

<section id="stock" class="hidden">

<h2>Stok</h2>

<input id="stockName" placeholder="malzeme">

<input id="stockQty" placeholder="adet">

<button onclick="addStock()">Ekle</button>

<ul id="stockList"></ul>

</section>

<section id="report" class="hidden">

<h2>Günlük Ciro</h2>

<h3 id="dailyTotal"></h3>

</section>

</main>

<script>

/* ekran değiştirme */

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

/* maliyet hesaplama */

function calculate(){

let w=Number(document.getElementById("w").value)
let h=Number(document.getElementById("h").value)
let price=Number(document.getElementById("price").value)
let fixed=Number(document.getElementById("fixed").value)

let area=(w*h)/10000

let total=(area*price)+fixed

document.getElementById("result").innerText="Toplam: "+total+"₺"

}

/* indexedDB */

const DB_NAME="uvmasterdb"
const DB_VERSION=1

let db

let req=indexedDB.open(DB_NAME,DB_VERSION)

req.onupgradeneeded=e=>{

db=e.target.result

db.createObjectStore("orders",{keyPath:"id",autoIncrement:true})

db.createObjectStore("stock",{keyPath:"id",autoIncrement:true})

}

req.onsuccess=e=>{

db=e.target.result

loadOrders()
loadStock()

}

/* sipariş */

function addOrder(){

let name=document.getElementById("orderName").value
let price=Number(document.getElementById("orderPrice").value)

let tx=db.transaction("orders","readwrite")
let store=tx.objectStore("orders")

store.add({
name,
price,
date:Date.now()
})

tx.oncomplete=loadOrders

}

/* siparişleri yükle */

function loadOrders(){

let list=document.getElementById("orderList")

list.innerHTML=""

let tx=db.transaction("orders")
let store=tx.objectStore("orders")

store.openCursor().onsuccess=e=>{

let cursor=e.target.result

if(cursor){

let li=document.createElement("li")

li.innerText=cursor.value.name+" - "+cursor.value.price+"₺"

list.appendChild(li)

cursor.continue()

}

}

calcDaily()

}

/* stok */

function addStock(){

let name=document.getElementById("stockName").value
let qty=document.getElementById("stockQty").value

let tx=db.transaction("stock","readwrite")
let store=tx.objectStore("stock")

store.add({
name,
qty
})

tx.oncomplete=loadStock

}

function loadStock(){

let list=document.getElementById("stockList")

list.innerHTML=""

let tx=db.transaction("stock")
let store=tx.objectStore("stock")

store.openCursor().onsuccess=e=>{

let cursor=e.target.result

if(cursor){

let li=document.createElement("li")

li.innerText=cursor.value.name+" - "+cursor.value.qty

list.appendChild(li)

cursor.continue()

}

}

}

/* günlük ciro */

function calcDaily(){

let total=0

let tx=db.transaction("orders")
let store=tx.objectStore("orders")

store.openCursor().onsuccess=e=>{

let cursor=e.target.result

if(cursor){

total+=cursor.value.price

cursor.continue()

}else{

document.getElementById("dailyTotal").innerText=total+"₺"

}

}

}

/* offline service worker */

if("serviceWorker" in navigator){

const swCode=`
self.addEventListener('install',e=>{
self.skipWaiting()
})
self.addEventListener('fetch',e=>{
})
`

const blob=new Blob([swCode],{type:'text/javascript'})
const url=URL.createObjectURL(blob)

navigator.serviceWorker.register(url)

}

</script>

</body>
</html>
