    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --neon-red: #ff2a2a;
            --neon-orange: #ff6600;
            --metal-dark: #0a0a0a;
            --metal-mid: #1a1a1a;
            --metal-light: #2a2a2a;
            --eye-red: #ff0000;
            --grid-color: rgba(255, 102, 0, 0.1);
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--metal-dark);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        /* Scanline Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15),
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--neon-orange);
            margin-bottom: 20px;
            position: relative;
        }
        
        .header::after {
            content: '● SYSTEM ONLINE';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--metal-dark);
            padding: 0 10px;
            color: var(--neon-orange);
            font-size: 0.7rem;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        h1 {
            font-size: 1.8rem;
            color: var(--neon-orange);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-orange);
        }
        
        .subtitle {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        
        /* Level Selector */
        .level-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .level-tab {
            flex: 1;
            min-width: 80px;
            padding: 15px 10px;
            background: var(--metal-mid);
            border: 1px solid var(--metal-light);
            color: #666;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }
        
        .level-tab.active {
            background: var(--neon-orange);
            color: #000;
            border-color: var(--neon-orange);
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.4);
        }
        
        .level-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .level-tab:hover::before {
            left: 100%;
        }
        
        /* Stats Panel */
        .stats-panel {
            background: var(--metal-mid);
            border: 1px solid var(--metal-light);
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.8rem;
        }
        
        .stat-box {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-left: 2px solid var(--neon-orange);
        }
        
        .stat-label {
            color: #666;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: var(--neon-orange);
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        /* Exercise Card */
        .exercise-card {
            background: var(--metal-mid);
            border: 1px solid var(--metal-light);
            margin-bottom: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        
        .exercise-card:hover {
            transform: translateX(5px);
            border-color: var(--neon-orange);
        }
        
        .exercise-header {
            padding: 15px;
            background: linear-gradient(90deg, var(--metal-mid), var(--metal-light));
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .exercise-name {
            font-size: 1.1rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .difficulty-badge {
            padding: 5px 10px;
            font-size: 0.7rem;
            background: var(--neon-red);
            color: #fff;
        }
        
        .exercise-content {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--metal-light);
        }
        
        .exercise-content.active {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Anatomy Display */
        .anatomy-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .body-figure {
            width: 120px;
            height: 200px;
            position: relative;
            background: var(--metal-dark);
            border: 1px solid var(--metal-light);
        }
        
        .body-svg {
            width: 100%;
            height: 100%;
        }
        
        .muscle-group {
            fill: #333;
            stroke: #555;
            stroke-width: 1;
            transition: all 0.3s;
        }
        
        .muscle-group.active {
            fill: var(--neon-orange);
            stroke: var(--neon-red);
            filter: drop-shadow(0 0 5px var(--neon-orange));
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .muscle-info {
            flex: 1;
            min-width: 200px;
        }
        
        .muscle-title {
            color: var(--neon-orange);
            font-size: 1rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .muscle-list {
            list-style: none;
            font-size: 0.9rem;
        }
        
        .muscle-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--metal-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .muscle-list li::before {
            content: '▸';
            color: var(--neon-orange);
        }
        
        /* Exercise Details */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .detail-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-left: 3px solid var(--neon-orange);
        }
        
        .detail-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-size: 1.1rem;
            color: #fff;
        }
        
        .progression-path {
            background: rgba(255, 102, 0, 0.1);
            border: 1px solid var(--neon-orange);
            padding: 15px;
            margin-top: 15px;
        }
        
        .progression-title {
            color: var(--neon-orange);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .progression-steps {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #ccc;
        }
        
        .tip-box {
            background: rgba(255, 42, 42, 0.1);
            border-left: 3px solid var(--neon-red);
            padding: 15px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #ff9999;
        }
        
        .tip-box::before {
            content: '⚠ T-800 PROTOCOL: ';
            color: var(--neon-red);
            font-weight: bold;
        }
        
        /* Timer */
        .timer-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--metal-mid);
            border: 2px solid var(--neon-orange);
            padding: 15px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.3);
            z-index: 100;
        }
        
        .timer-display {
            font-size: 1.2rem;
            color: var(--neon-orange);
            font-weight: bold;
        }
        
        .timer-label {
            font-size: 0.6rem;
            color: #666;
        }
        
        /* Complete Button */
        .complete-btn {
            width: 100%;
            padding: 15px;
            background: var(--neon-orange);
            color: #000;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .complete-btn:hover {
            background: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
        }
        
        .complete-btn.completed {
            background: #0f0;
            color: #000;
        }
        
        /* Progress Bar */
        .progress-container {
            margin-bottom: 20px;
        }
        
        .progress-bar {
            height: 10px;
            background: var(--metal-light);
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-red), var(--neon-orange));
            width: 0%;
            transition: width 0.5s;
            box-shadow: 0 0 10px var(--neon-orange);
        }
        
        .progress-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--neon-orange);
            margin-top: 5px;
        }
        
        /* Rest Day */
        .rest-day {
            text-align: center;
            padding: 40px 20px;
            background: var(--metal-mid);
            border: 2px dashed var(--metal-light);
        }
        
        .rest-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .rest-title {
            color: var(--neon-orange);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--metal-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--neon-orange);
        }
        
        /* Checkbox animation */
        .check-animation {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-orange);
            margin-right: 10px;
            position: relative;
            transition: all 0.3s;
        }
        
        .completed .check-animation {
            background: var(--neon-orange);
        }
        
        .completed .check-animation::after {
            content: '✓';
            position: absolute;
            color: #000;
            font-weight: bold;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

        // Initialize
        function init() {
            updateProgress();
            renderWorkout();
        }

        function changeLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-tab').forEach((tab, index) => {
                tab.classList.toggle('active', index + 1 === level);
            });
            document.getElementById('currentLevel').textContent = level;
            renderWorkout();
        }

        function renderWorkout() {
            const container = document.getElementById('workoutContainer');

                                <div class="body-figure">
                                    <svg class="body-svg" viewBox="0 0 100 200">
                                        <!-- Simplified human figure with muscle highlighting -->
                                        <path class="muscle-group ${ex.muscles.includes('göğüs') || ex.muscles.includes('göğüs üstü') || ex.muscles.includes('göğüs altı') || ex.muscles.includes('iç göğüs') ? 'active' : ''}" 
                                              d="M30,40 Q50,35 70,40 L65,60 Q50,65 35,60 Z"/>
                                        <path class="muscle-group ${ex.muscles.includes('ön omuz') || ex.muscles.includes('omuz') || ex.muscles.includes('trapez') ? 'active' : ''}"

                                        <path class="muscle-group ${ex.muscles.includes('arka kol') || ex.muscles.includes('triceps') || ex.muscles.includes('biceps') || ex.muscles.includes('ön kol') ? 'active' : ''}"

                                        <path class="muscle-group ${ex.muscles.includes('karın') || ex.muscles.includes('core') || ex.muscles.includes('oblique') || ex.muscles.includes('bel') ? 'active' : ''}" 
                                              d="M35,65 L65,65 L60,90 L40,90 Z"/>
                                        <path class="muscle-group ${ex.muscles.includes('sırt') || ex.muscles.includes('sırt altı') || ex.muscles.includes('sırt orta') || ex.muscles.includes('sırt üstü') || ex.muscles.includes('latissimus') ? 'active' : ''}" 
                                              d="M30,40 L25,65 L35,65 L40,40 Z M70,40 L75,65 L65,65 L60,40 Z"/>
                                        <path class="muscle-group ${ex.muscles.includes('ön bacak') || ex.muscles.includes('quadriceps') ? 'active' : ''}"

                                        <path class="muscle-group ${ex.muscles.includes('arka bacak') || ex.muscles.includes('hamstring') ? 'active' : ''}"

                                <div class="detail-box">

                                    <div class="detail-value">${ex.difficulty}</div>

                            </button>
                        </div>
                    </div>
                `;
            });

            // Add rest day recommendation
            html += `
                <div class="rest-day">
                    <div class="rest-icon">🔋</div>
                    <div class="rest-title">İYİLEŞME PROTOCOLÜ</div>
                    <div style="font-size: 0.9rem; color: #999; margin-bottom: 15px;">
                        Kaslar dinlenirken büyür. Her antrenman sonrası 48 saat dinlenme önerilir.
                    </div>
                    <div style="font-size: 0.8rem; color: var(--neon-orange);">
                        Önerilen: 7-9 saat uyku | Yüksek protein | Bol su (3-4L/gün)
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        function toggleExercise(id) {
            const content = document.getElementById(`content-${id}`);
            content.classList.toggle('active');
        }

        function toggleComplete(id) {
            const index = completedExercises.indexOf(id);
            const btn = document.getElementById(`btn-${id}`);
            const card = document.getElementById(`card-${id}`);
            
            if (index > -1) {
                completedExercises.splice(index, 1);
                btn.classList.remove('completed');
                btn.textContent = 'TERMINATÖR ONAYI - TAMAMLA';
                card.style.opacity = '1';
            } else {
                completedExercises.push(id);
                btn.classList.add('completed');
                btn.textContent = '✓ TAMAMLANDI';
                card.style.opacity = '0.7';
                
                // Celebration effect
                btn.style.transform = 'scale(1.05)';
                setTimeout(() => btn.style.transform = 'scale(1)', 200);
            }
            
            localStorage.setItem('t800_completed', JSON.stringify(completedExercises));
            updateProgress();
        }

        function updateProgress() {
            const totalExercises = Object.values(programData).reduce((acc, level) => acc + level.exercises.length, 0);
            const percent = Math.round((completedExercises.length / totalExercises) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
            
            // Calculate level based on completed exercises
            const level1Count = programData[1].exercises.length;
            const level2Count = programData[2].exercises.length;
            const level3Count = programData[3].exercises.length;
            const level4Count = programData[4].exercises.length;
            
            let completed = completedExercises.length;
            let currentLvl = 1;
            
            if (completed >= level1Count) {
                completed -= level1Count;
                currentLvl = 2;
            }
            if (completed >= level2Count) {
                completed -= level2Count;
                currentLvl = 3;
            }
            if (completed >= level3Count) {
                completed -= level3Count;
                currentLvl = 4;
            }
            if (completed >= level4Count) {
                currentLvl = 5;
            }
            
            document.getElementById('currentLevel').textContent = currentLvl;
        }

        function toggleTimer() {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                isTimerRunning = false;
                timerSeconds = 0;
                document.getElementById('timerDisplay').textContent = '00:00';
            } else {
                isTimerRunning = true;
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    const mins = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                    const secs = (timerSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('timerDisplay').textContent = `${mins}:${secs}`;
                }, 1000);
            }
        }

        // Initialize app
        init();
        
        // Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent(`
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
            `)).catch(() => {});
        }
    </script>
