<!DOCTYPE html>
<html lang="tr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esma-i Hüsna - Gelişmiş Zikir Uygulaması</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1f1a 0%, #1a2f2a 100%);
            min-height: 100vh;
            color: #e8f5e9;
            overflow-x: hidden;
        }
        
        .arabic-font { font-family: 'Scheherazade New', 'Amiri', serif; }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 20% 50%, #d4af37 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #2d8a6e 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, #d4af37 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .achievement.unlocked {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #d4af37;
            color: #0f1f1a;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div id="root"></div>
    
    <script type="text/babel">
        // Data
        const namesData = [
            { id: 1, arabic: "الرَّحْمَنُ", turkish: "Er-Rahmân", meaning: "Çok merhametli, esirgeyen", description: "Dünya ve ahirette tüm mahlûkata merhamet eden, rızkını veren.", purpose: "Rızık bolluğu, sıkıntıdan kurtulmak için.", virtues: "Her gün 100 defa okuyanın kalbi ferahlar, rızkı artar.", target: 100 },
            { id: 2, arabic: "الرَّحِيمُ", turkish: "Er-Rahîm", meaning: "Çok acıyan, merhamet eden", description: "Ahirette müminlere merhamet eden, mağfiret eden.", purpose: "Günahların affı, ahiret saadeti için.", virtues: "Her gün 100 defa okuyan Allah'ın rahmetine nail olur.", target: 100 },
            // ... (diğer 97 isim burada olacak - kısa tutmak için ilk 2'si gösterildi)
        ];

        const predefinedPrograms = [
            {
                id: 'morning',
                name: 'Sabah Zikri',
                description: 'Güne başlarken çekilecek 7 isim',
                names: [1, 2],
                color: '#f39c12'
            },
            {
                id: 'evening',
                name: 'Akşam Zikri',
                description: 'Günü kapatırken çekilecek 7 isim',
                names: [1, 2],
                color: '#9b59b6'
            }
        ];

        const achievementsData = [
            { id: 'first', icon: '🌱', title: 'İlk Adım', desc: 'İlk zikrini tamamla', condition: (stats) => stats.totalDhikr >= 1 },
            { id: 'ten', icon: '🔟', title: 'Onlu Çıkış', desc: '10 zikir tamamla', condition: (stats) => stats.totalDhikr >= 10 },
        ];

        // React Components
        const App = () => {
            const [data, setData] = React.useState({
                counts: {},
                favorites: [],
                notes: {},
                history: {},
                lastReset: null,
                dailyTarget: 1000,
                currentProgram: null,
                unlockedAchievements: [],
                lastActiveDate: null,
                streak: 0
            });
            
            const [currentFilter, setCurrentFilter] = React.useState('all');
            const [currentModal, setCurrentModal] = React.useState(null);
            const [modalData, setModalData] = React.useState(null);
            const [toast, setToast] = React.useState(null);

            // Load data on mount
            React.useEffect(() => {
                const saved = localStorage.getItem('esmaDataV2');
                if (saved) {
                    setData(prev => ({ ...prev, ...JSON.parse(saved) }));
                }
            }, []);

            // Save data whenever it changes
            React.useEffect(() => {
                localStorage.setItem('esmaDataV2', JSON.stringify(data));
            }, [data]);

            // Check daily reset
            React.useEffect(() => {
                checkDailyReset();
            }, []);

            const checkDailyReset = () => {
                const today = new Date().toDateString();
                if (data.lastReset !== today) {
                    if (data.lastReset) {
                        const yesterdayTotal = Object.values(data.counts).reduce((a, b) => a + b, 0);
                        setData(prev => ({
                            ...prev,
                            history: { ...prev.history, [prev.lastReset]: yesterdayTotal },
                            counts: {},
                            lastReset: today
                        }));
                    }
                }
            };

            const showToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 3000);
            };

            const increment = (id) => {
                setData(prev => ({
                    ...prev,
                    counts: { ...prev.counts, [id]: (prev.counts[id] || 0) + 1 }
                }));
                showToast(`${namesData.find(n => n.id === id).turkish} +1`);
            };

            const decrement = (id) => {
                if (data.counts[id] > 0) {
                    setData(prev => ({
                        ...prev,
                        counts: { ...prev.counts, [id]: prev.counts[id] - 1 }
                    }));
                }
            };

            const toggleFavorite = (id) => {
                setData(prev => {
                    const favorites = [...prev.favorites];
                    const index = favorites.indexOf(id);
                    if (index > -1) {
                        favorites.splice(index, 1);
                        showToast('Favorilerden çıkarıldı');
                    } else {
                        favorites.push(id);
                        showToast('Favorilere eklendi ❤️');
                    }
                    return { ...prev, favorites };
                });
            };

            const isCompleted = (id) => {
                const name = namesData.find(n => n.id === id);
                return (data.counts[id] || 0) >= name.target;
            };

            const isFavorite = (id) => data.favorites.includes(id);

            const getFilteredNames = () => {
                switch(currentFilter) {
                    case 'completed':
                        return namesData.filter(n => isCompleted(n.id));
                    case 'incomplete':
                        return namesData.filter(n => !isCompleted(n.id));
                    case 'favorites':
                        return namesData.filter(n => isFavorite(n.id));
                    default:
                        return namesData;
                }
            };

            const completed = namesData.filter(n => isCompleted(n.id)).length;
            const totalDhikr = Object.values(data.counts).reduce((a, b) => a + b, 0);
            const favorites = data.favorites.length;
            const percent = Math.round((completed / namesData.length) * 100);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="text-center py-8 px-4 bg-gradient-to-b from-green-800/40 to-transparent border-b-2 border-yellow-500 relative overflow-hidden">
                        <div className="text-5xl md:text-6xl font-bold text-yellow-500 mb-2 arabic-font" style={{textShadow: '0 0 20px rgba(212,175,55,0.3)'}}>
                            Esma-i Hüsna
                        </div>
                        <p className="text-green-200 text-lg">Allah'ın 99 İsmi - Gelişmiş Zikir ve İbadet Rehberi</p>
                    </header>

                    {/* Quick Actions */}
                    <div className="max-w-6xl mx-auto px-4 py-6">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <button className="bg-green-900/80 border border-yellow-500 rounded-xl p-4 hover:shadow-lg transition-all">
                                <div className="text-3xl mb-2">📿</div>
                                <div className="font-bold text-yellow-500">Zikir Programı</div>
                                <div className="text-sm text-green-300">Hazır programlar</div>
                            </button>
                            <button className="bg-green-900/80 border border-yellow-500 rounded-xl p-4 hover:shadow-lg transition-all">
                                <div className="text-3xl mb-2">📊</div>
                                <div className="font-bold text-yellow-500">İstatistikler</div>
                                <div className="text-sm text-green-300">İlerleme takibi</div>
                            </button>
                            <button className="bg-green-900/80 border border-yellow-500 rounded-xl p-4 hover:shadow-lg transition-all">
                                <div className="text-3xl mb-2">🏆</div>
                                <div className="font-bold text-yellow-500">Başarılar</div>
                                <div className="text-sm text-green-300">Rozetler</div>
                            </button>
                            <button className="bg-green-900/80 border border-yellow-500 rounded-xl p-4 hover:shadow-lg transition-all">
                                <div className="text-3xl mb-2">⚡</div>
                                <div className="font-bold text-yellow-500">Hızlı Zikir</div>
                                <div className="text-sm text-green-300">Otomatik sayaç</div>
                            </button>
                        </div>
                    </div>

                    {/* Progress Cards */}
                    <div className="max-w-6xl mx-auto px-4 py-6">
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {/* Genel İlerleme */}
                            <div className="bg-green-900/80 border border-yellow-500 rounded-2xl p-6">
                                <h3 className="text-yellow-500 text-xl mb-4 flex items-center gap-2">📊 Genel İlerleme</h3>
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <div className="text-center bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">
                                        <span className="text-2xl font-bold text-yellow-500">{completed}</span>
                                        <div className="text-sm text-green-300">Tamamlanan</div>
                                    </div>
                                    <div className="text-center bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">
                                        <span className="text-2xl font-bold text-yellow-500">{totalDhikr}</span>
                                        <div className="text-sm text-green-300">Toplam Zikir</div>
                                    </div>
                                    <div className="text-center bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">
                                        <span className="text-2xl font-bold text-yellow-500">{favorites}</span>
                                        <div className="text-sm text-green-300">Favorilerim</div>
                                    </div>
                                    <div className="text-center bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">
                                        <span className="text-2xl font-bold text-yellow-500">{percent}%</span>
                                        <div className="text-sm text-green-300">Tamamlanma</div>
                                    </div>
                                </div>
                                <div className="relative bg-black/30 rounded-full h-3 overflow-hidden">
                                    <div className="absolute inset-0 bg-gradient-to-r from-green-600 to-yellow-500 progress-bar" style={{width: `${percent}%`}}></div>
                                </div>
                            </div>

                            {/* Aktivite Takvimi */}
                            <div className="bg-green-900/80 border border-yellow-500 rounded-2xl p-6">
                                <h3 className="text-yellow-500 text-xl mb-4 flex items-center gap-2">📅 Aktivite Takvimi</h3>
                                <div className="grid grid-cols-7 gap-2">
                                    {/* Heatmap buraya gelecek */}
                                </div>
                            </div>

                            {/* Günlük Hedef */}
                            <div className="bg-green-900/80 border border-yellow-500 rounded-2xl p-6">
                                <h3 className="text-yellow-500 text-xl mb-4 flex items-center gap-2">🎯 Günlük Hedef</h3>
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <div className="text-center bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">
                                        <span className="text-2xl font-bold text-yellow-500">{data.dailyTarget}</span>
                                        <div className="text-sm text-green-300">Hedef</div>
                                    </div>
                                    <div className="text-center bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">
                                        <span className="text-2xl font-bold text-yellow-500">{totalDhikr}</span>
                                        <div className="text-sm text-green-300">Bugün</div>
                                    </div>
                                </div>
                                <div className="relative bg-black/30 rounded-full h-3 overflow-hidden">
                                    <div className="absolute inset-0 bg-gradient-to-r from-blue-500 to-green-500" style={{width: '45%'}}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Filter Tabs */}
                    <div className="max-w-6xl mx-auto px-4 py-6">
                        <div className="flex gap-2 overflow-x-auto">
                            {['all', 'completed', 'incomplete', 'favorites'].map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setCurrentFilter(tab)}
                                    className={`px-4 py-2 rounded-full whitespace-nowrap transition-all ${
                                        currentFilter === tab 
                                            ? 'bg-yellow-500 text-green-900 font-bold' 
                                            : 'bg-green-800/60 text-green-300 border border-green-600'
                                    }`}
                                >
                                    {tab === 'all' ? 'Tümü' : tab === 'completed' ? 'Tamamlananlar' : tab === 'incomplete' ? 'Devam Eden' : 'Favorilerim'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Names Grid */}
                    <div className="max-w-6xl mx-auto px-4 pb-12">
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {getFilteredNames().map(name => {
                                const count = data.counts[name.id] || 0;
                                const isCompleted = isCompleted(name.id);
                                const isFav = isFavorite(name.id);
                                const progress = Math.min((count / name.target) * 100, 100);
                                
                                return (
                                    <div key={name.id} className={`bg-green-900/80 border rounded-2xl p-6 transition-all hover:shadow-xl ${
                                        isCompleted ? 'border-yellow-500 shadow-yellow-500/20' : 'border-yellow-500/30'
                                    } ${isFav ? 'border-red-400 shadow-red-400/20' : ''}`}>
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="arabic-font text-4xl text-yellow-500 text-center flex-1">{name.arabic}</div>
                                            <button
                                                onClick={() => toggleFavorite(name.id)}
                                                className={`w-9 h-9 rounded-full flex items-center justify-center transition-all ${
                                                    isFav ? 'bg-red-500 text-white' : 'bg-white/10 text-green-300'
                                                }`}
                                            >
                                                {isFav ? '♥' : '♡'}
                                            </button>
                                        </div>
                                        <div className="text-xl font-bold text-center mb-2">{name.turkish}</div>
                                        <div className="text-green-300 text-center mb-4">{name.meaning}</div>
                                        <div className="bg-green-800/40 p-3 rounded-lg mb-4 border-r-4 border-yellow-500">
                                            <strong className="text-yellow-400">🎯 {name.purpose}</strong>
                                        </div>
                                        <div className="relative bg-black/30 rounded-full h-2 mb-4 overflow-hidden">
                                            <div className="absolute inset-0 bg-gradient-to-r from-green-600 to-yellow-500" style={{width: `${progress}%`}}></div>
                                        </div>
                                        <div className="flex items-center justify-center gap-4">
                                            <button 
                                                onClick={() => decrement(name.id)}
                                                className="w-10 h-10 rounded-full border-2 border-yellow-500 text-yellow-500 hover:bg-yellow-500 hover:text-green-900 transition-all"
                                            >
                                                −
                                            </button>
                                            <div className="text-2xl font-bold text-yellow-500 min-w-[60px] text-center">{count}</div>
                                            <button 
                                                onClick={() => increment(name.id)}
                                                className="w-10 h-10 rounded-full border-2 border-yellow-500 text-yellow-500 hover:bg-yellow-500 hover:text-green-900 transition-all"
                                            >
                                                +
                                            </button>
                                        </div>
                                        <div className="text-center text-green-300 text-sm mt-2">
                                            Hedef: {name.target} | {isCompleted ? '✓ Tamamlandı' : `%${Math.round(progress)} tamamlandı`}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Toast */}
                    {toast && (
                        <div className="toast show">{toast}</div>
                    )}
                </div>
            );
        };

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
